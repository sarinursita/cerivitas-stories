<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sahabat Bintang - CYOA</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:linear-gradient(135deg,#0c0020,#1a0a3e,#2d1b69);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;font-family:'Segoe UI',sans-serif}
.game{background:linear-gradient(180deg,#1a1a3e,#2d2d6b);border-radius:24px;padding:30px;max-width:600px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,0.5);border:1px solid rgba(255,255,255,0.1)}
h1{text-align:center;color:#ffd700;font-size:26px}
.sub{text-align:center;color:#aaa;font-size:13px;margin-bottom:15px}
.badge{background:#ffd700;color:#1a1a3e;padding:4px 12px;border-radius:20px;font-size:13px;display:inline-block;margin-bottom:10px}
.story{background:rgba(255,255,255,0.08);border-radius:16px;padding:24px;min-height:180px;margin-bottom:20px;font-size:18px;line-height:1.7;color:#e0d0ff}
.choices{display:flex;flex-direction:column;gap:10px}
.btn{background:linear-gradient(135deg,#ffd700,#ff8c00);color:#1a1a3e;border:none;border-radius:12px;padding:14px 20px;font-size:16px;font-weight:bold;cursor:pointer;transition:.2s}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(255,215,0,0.4)}
.reset{background:#ff6b6b;color:#fff;border:none;border-radius:12px;padding:10px;font-size:14px;cursor:pointer;width:100%;margin-top:15px}
</style>
</head>
<body>
<div class="game">
<h1>🚀 Sahabat Bintang</h1>
<p class="sub">Sebuah petualangan persahabatan di luar angkasa</p>
<div class="badge" id="badge">🌍 Bumi</div>
<div class="story" id="story">Kamu dan sahabatmu, Bima, sedang berkemah di halaman belakang. Tiba-tiba, sebuah bintang jatuh... tapi berhenti di depan kalian! Dari dalam bintang itu, muncul makhluk kecil biru yang menangis.</div>
<div class="choices" id="choices"></div>
<button class="reset" onclick="go('start')">🔄 Mulai Lagi</button>
</div>
<script>
const S={
start:{text:"Kamu dan sahabatmu, Bima, sedang berkemah. Tiba-tiba bintang jatuh berhenti di depan kalian! Dari dalamnya, makhluk kecil biru yang menangis.",choices:[{text:"💙 \"Kenapa kamu nangis?\"",next:"tanya"},{text:"🫂 Peluk makhluk itu",next:"peluk"},{text:"😨 Mundur takut",next:"mundur"}]},
tanya:{text:"Makhluk biru itu terisak, 'Aku Nebula... Aku tersesat dan jauh dari rumah. Aku ingin pulang ke Planet Persahabatan, tapi pesawatku rusak.'",choices:[{text:"🔧 Bantu Nebula!",next:"bantu1"},{text:"📞 Panggil Bima buat bantu",next:"bantuBima"}]},
peluk:{text:"Kamu peluk Nebula. Dia berhenti menangis dan tersenyum. 'Terima kasih... Tak ada yang pernah memelukku sebelumnya. Kalian baik sekali.' Nebula menunjukkan kristal biru yang bersinar.",choices:[{text:"🌟 \"Ayo kita bantu kamu pulang!\"",next:"bantu1"},{text:"❓ Tanya soal kristal itu",next:"kristal"}]},
mundur:{text:"Bima berkata, 'Jangan takut, dia butuh bantuan!' Bima maju dan Nebula tersenyum. Kamu merasa berani dan ikut maju. Persahabatan memberimu keberanian!",choices:[{text:"💪 Maju dan bantu Nebula",next:"bantu1"}]},
bantuBima:{text:"Bima datang dengan kotak peralatan. 'Aku bisa bikin antena komunikasi dari barang bekas!' Nebula senang. Kalian bertiga bekerja sama memperbaiki pesawat.",choices:[{text:"🔧 Kerja sama tim!",next:"perbaiki"}]},
kristal:{text:"Nebula menjelaskan, 'Ini Kristal Persahabatan. Kekuatannya berasal dari ikatan tulus. Makin kuat persahabatan, makin terang sinarnya.' Kristal itu mulai bersinar hangat.",choices:[{text:"🌟 Gunakan kristal buat bantu Nebula",next:"bantu1"}]},
bantu1:{text:"Nebula membawa kalian ke pesawatnya yang tersembunyi di balik bukit. Pesawat itu berbentuk kerang mutiara! Tapi mesinnya kehilangan 3 Bintang Energi.",choices:[{text:"🌟 Cari Bintang Energi 1: Hutan",next:"hutan"},{text:"🌟 Cari Bintang Energi 2: Sungai",next:"sungai"},{text:"🌟 Cari Bintang Energi 3: Gua",next:"gua"}]},
hutan:{text:"Di hutan, kalian bertemu sekelompok kunang-kunang yang berbicara! 'Kami menjaga Bintang Energi. Tunjukkan bahwa kalian peduli pada sesama!'",choices:[{text:"🪲 Bantu kunang-kunang",next:"bantuKunang"},{text:"🏃 Ambil paksa",next:"ambilPaksa"}]},
sungai:{text:"Di tepi sungai bintang, Bintang Energi kedua terapung di atas air. Tapi ada penghalang — sekelompok ikan pelangi yang menjaga.",choices:[{text:"🎣 Pancing ikan dengan kebaikan",next:"pancingIkan"},{text:"🏊‍♂️ Berenang ambil",next:"ambilPaksa2"}]},
gua:{text:"Di dalam gua kristal, Bintang Energi ketiga berada di altar. Tapi gua gelap dan kamunya takut sendirian.",choices:[{text:"🕯️ Minta Bima buat nemenin",next:"berduaGua"},{text:"💪 Berani sendiri!",next:"beraniSendiri"}]},
bantuKunang:{text:"Kunang-kunang kehilangan rumahnya karena pohon tua tumbang. Kalian gotong royong membersihkan dahan. Kunang-kunang senang dan memberikan Bintang Energi!",choices:[{text:"🌟 Bintang 1 dapat!",next:"bantu1"}]},
ambilPaksa:{text:"Kamu coba ambil paksa, tapi Bima menghentikanmu. 'Kita harus baik, bukan mencuri!' Kalian meminta maaf dan membantu kunang-kunang.",choices:[{text:"🪲 Bantu kunang-kunang",next:"bantuKunang"}]},
pancingIkan:{text:"Kamu tidak memancing, tapi memberi ikan-ikan itu kue yang kamu bawa! Ikan-ikan senang dan membiarkan kamu mengambil Bintang Energi.",choices:[{text:"🌟 Bintang 2 dapat!",next:"bantu1"}]},
ambilPaksa2:{text:"Kamu loncat ke sungai, tapi airnya terasa dingin dan kamu kedinginan. Bima menarikmu keluar. 'Harus minta izin dulu!'",choices:[{text:"🎣 Coba cara baik",next:"pancingIkan"}]},
berduaGua:{text:"Kamu dan Bima masuk bersama. Di dalam, kristal bersinar menerangi jalan. Kalian menemukan Bintang Energi dan Nebula menangis haru. 'Kalian sahabat sejati!'",choices:[{text:"🌟 Bintang 3 dapat!",next:"lengkap"}]},
beraniSendiri:{text:"Kamu masuk sendirian. Di kegelapan, kamu ingat kata Nebula tentang persahabatan. Kristal Persahabatan di sakumu mulai bersinar dan menerangi jalanmu!",choices:[{text:"🌟 Bintang 3 dapat!",next:"lengkap"}]},
perbaiki:{text:"Bima berhasil membuat antena, Nebula memperbaiki mesin, dan kamu menghibur Nebula saat dia sedih. Kerja sama tim yang hebat! Tapi mesin masih butuh 3 Bintang Energi.",choices:[{text:"🌟 Cari Bintang Energi!",next:"bantu1"}]},
lengkap:{text:"Semua Bintang Energi terkumpul! Pesawat Nebula menyala terang. Nebula memeluk kalian. 'Kalian bukan hanya menolongku pulang... kalian mengajarkanku arti persahabatan sejati.' Kristal Persahabatan bersinar sangat terang. Nebula naik ke pesawatnya. 'Aku akan selalu mengingat kalian!'",choices:[{text:"🌟 SELAMAT! Main lagi?",next:"start"}]}
};
function go(id){const n=S[id];if(!n)return;document.getElementById('story').innerHTML=n.text;const c=document.getElementById('choices');c.innerHTML='';if(id==='start')document.getElementById('badge').textContent='🌍 Bumi';else if(n.text.includes('SELAMAT'))document.getElementById('badge').textContent='🏆 MISI SELESAI!';else document.getElementById('badge').textContent='🚀 Luar Angkasa';n.choices.forEach(ch=>{const b=document.createElement('button');b.className='btn';b.textContent=ch.text;b.onclick=()=>go(ch.next);c.appendChild(b)});}
go('start');
</script>
</body>
</html>
