<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Girls Day Out - CYOA</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:linear-gradient(135deg,#ff9a9e,#fad0c4);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;font-family:Segoe UI,sans-serif}
.game{background:#fff;border-radius:24px;padding:30px;max-width:650px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,0.15)}
h1{text-align:center;color:#ff6b6b;font-size:28px;margin-bottom:2px}
.sub{text-align:center;color:#888;font-size:13px;margin-bottom:12px;font-style:italic}
.badge{background:linear-gradient(135deg,#ff6b6b,#ee5a24);color:#fff;padding:4px 14px;border-radius:20px;font-size:12px;display:inline-block;margin-bottom:10px;font-weight:bold}
.story{background:#fef9f0;border:2px solid #ffe0d0;border-radius:16px;padding:22px;min-height:280px;margin-bottom:16px;font-size:15px;line-height:2;color:#444;text-align:justify}
.choices{display:flex;flex-direction:column;gap:8px}
.btn{background:linear-gradient(135deg,#ff6b6b,#ee5a24);color:#fff;border:none;border-radius:12px;padding:13px 20px;font-size:15px;cursor:pointer;text-align:left}
.btn:hover{transform:translateX(5px);box-shadow:0 6px 20px rgba(255,107,107,0.4)}
.reset{background:#636e72;color:#fff;border:none;border-radius:10px;padding:10px;font-size:13px;cursor:pointer;width:100%;margin-top:14px}
</style>
</head>
<body>
<div class="game">
<h1>Girls Day Out</h1>
<p class="sub">Lima sahabat SD bersama kakak maba. Girls day out! Satu mobil. Satu petualangan.</p>
<div class="badge" id="badge">BERANGKAT</div>
<div class="story" id="story">Memuat cerita...</div>
<div class="choices" id="choices"></div>
<button class="reset" onclick="go(start)">MULAI LAGI</button>
</div>
<script>
var story = [
  {id:"start", text:"Hari ini girls day out! Aku Nala, bersama sahabat-sahabatku Rara, Dinda, Mimi, dan Cinta, diajak Kak Maya—kakaknya Rara yang baru masuk kuliah—untuk jalan-jalan! Kak Maya berusia 20 tahun, mahasiswa baru yang penuh semangat. Kami berenam berdesakan di mobil mungil milik Kak Maya. Nala duduk di depan. Rara, Dinda, Mimi, dan Cinta berdesakan di kursi belakang. Rara sudah mulai berswafoto sejak mobil berjalan.<br><br>Kak Maya mengemudi sambil mengikuti petunjuk Google Maps di ponselnya. Dua puluh menit pertama berjalan lancar. Namun, Kak Maya kemudian berbelok di pertigaan yang keliru. “Kak, yakin ini jalan yang benar?” tanya Mimi ragu. “Tentu, ini jalan pintas,” jawab Kak Maya. Semakin lama, jalan semakin sempit. Dari aspal berubah menjadi tanah. Dari tanah berubah menjadi berbatu.<br><br>Tiba-tiba, ponsel Kak Maya mati. Baterainya habis. Dinda membuka peta di ponselnya sendiri. “Kak, jalan ini tidak ada di peta. Ini jalur hutan.” Kak Maya tersenyum canggung. “Sepertinya Maps-nya sedang error.”<br><br>Kak Maya mematikan mesin dan mengambil napas dalam-dalam. “Ayo, kita cari jalan keluar bersama-sama. Kakak janji akan membuat semuanya baik-baik saja.”", 
   choices:[{t:"Ikuti Kak Maya cari jalan", n:"ikutiKak"},{t:"Nala pimpin tim jelajah hutan", n:"nalaPimpin"},{t:"Tetap di mobil tunggu", n:"diamMobil"}]},
  {id:"ikutiKak", text:"Kalian berjalan mengikuti Kak Maya masuk ke hutan. Pepohonan tinggi menjulang. Rara sudah mengeluarkan ponsel untuk berswafoto. “Kak, foto aku dong!” Kak Maya tersenyum. “Ra, kita sedang mencari jalan, bukan untuk berswafoto.”<br><br>Tiba-tiba, Dinda berseru sambil menunjuk ke sebuah papan kayu lapuk. Ada tulisan di sana: POS 1 - IKUTI JEJAK BINTANG. “Ini petunjuk!” seru Mimi. “Seperti permainan mencari harta karun!”<br><br>Kak Maya memeriksa papan itu. “Mungkin ada yang menyiapkan petualangan untuk kita.” Nala sudah berlari ke depan. “Ayo kita ikuti jejaknya!”", 
   choices:[{t:"Ikuti jejak bintang", n:"jejakBintang"},{t:"Cari tahu siapa yang buat", n:"cariTahu"},{t:"Kembali ke mobil", n:"balikMobil"}]},
  {id:"nalaPimpin", text:"Nala mengambil alih. “Cinta, pegang tangan Mimi agar tidak terpisah. Rara, matikan ponsel dulu, baterai harus dihemat. Dinda, buka peta offline. Kak Maya, jaga bagian belakang!” Kalian berjalan dalam formasi rapi.<br><br>Setelah berjalan sepuluh menit kalian menemukan sungai kecil. Airnya jernih. “Kita ikuti sungai saja,” kata Nala. “Sungai pasti berujung ke pemukiman.” Namun, Dinda menggeleng. “Peta offlineku tidak mencatat sungai di sini.”<br><br>Mimi tiba-tiba bersin keras. Dari balik semak, terdengar suara. Cinta merapat ke Kak Maya. Namun, yang muncul hanyalah seekor tupai kecil. Semua tertawa lega. Namun, di batang pohon tempat tupai itu berasal, terlihat ukiran bintang.", 
   choices:[{t:"Periksa ukiran bintang", n:"jejakBintang"},{t:"Ikuti tupai itu", n:"ikutiTupai"},{t:"Istirahat di sungai", n:"istirahatSungai"}]},
  {id:"diamMobil", text:"Kalian memutuskan untuk tetap di dalam mobil. Kak Maya setuju. “Lebih aman menunggu daripada tersesat.” Rara mengomel sebentar, lalu berswafoto di dalam mobil. Dinda membaca buku tentang bertahan di alam liar. Mimi membuka jendela karena merasa gerah. Cinta duduk diam, memeluk bonekanya.<br><br>Setelah dua puluh menit, tidak ada seorang pun yang datang. “Kak, aku lapar,” rengek Mimi. Rara membuka ranselnya. Kosong. Dinda juga. Semua ransel kosong!<br><br>“Kakak menaruh bekal di bagasi mobil,” ingat Kak Maya. Ia memeriksa sakunya. “Kuncinya tertinggal di dalam mobil.” Kalian semua terdiam.", 
   choices:[{t:"Buka bagasi", n:"bukaBagasi"},{t:"Cari makanan di hutan", n:"cariMakan"},{t:"Telepon orang tua", n:"telponOrtu"}]},
  {id:"jejakBintang", text:"Kalian mengikuti jejak bintang yang terukir di pohon-pohon. Setiap dua puluh langkah selalu ada bintang baru. Rara yang paling bersemangat. Ini seperti di film!<br><br>Bintang ketujuh membawa kalian ke sebuah tempat terbuka. Di tengahnya ada tenda kecil berwarna merah. Di depan tenda ada meja piknik dengan sepiring kue! “KUE!” seru Mimi berlari. “Tunggu! Mungkin ini jebakan,” teriak Cinta. Namun Nala sudah memegang kue itu. “Aromanya seperti buatan Ibu.”<br><br>Di meja ada catatan: SELAMAT KALIAN MENEMUKAN POS 1. ISTIRAHAT DAN MAKAN. Kak Maya membaca catatan itu. Sepertinya ada yang menyiapkan ini untuk kita. Kalian makan kue dengan lahap. Cinta akhirnya tersenyum.", 
   choices:[{t:"Lanjut ke Pos 2 utara", n:"pos2"},{t:"Tunggu di tenda", n:"tungguTenda"},{t:"Eksplorasi tenda", n:"eksplorasiTenda"}]},
  {id:"cariTahu", text:"Kamu dan Kak Maya memeriksa papan petunjuk lebih teliti. “Lihat, Kak. Ada stiker kecil di pojok.” Kak Maya mengamatinya. Di stiker itu tertulis: DARI KAKAK UNTUK ADIK-ADIK TERSAYANG. Kak Maya tersenyum lebar. Sepertinya Kakak tahu siapa yang melakukan ini.<br><br>Sebelum sempat bertanya lebih lanjut Nala sudah tidak sabar. Ayo kita ikuti jejaknya! Ini seru! Rara setuju.<br><br>Kalian berjalan beriringan mengikuti jejak bintang. Hutan yang tadinya menyeramkan kini terasa seperti taman bermain. Bahkan Cinta yang penakut mulai ikut bernyanyi bersama Mimi.", 
   choices:[{t:"Ikuti jejak bintang", n:"jejakBintang"}]},
  {id:"balikMobil", text:"Kalian memutuskan untuk kembali ke mobil. Namun mobilnya tidak ada! Di tempat mobil diparkir hanya ada bekas ban. “Hah? Mobilnya ke mana?” Nala bingung.<br><br>Dinda mengeluarkan ponsel. Tidak ada sinyal. Rara mencoba menelepon. Juga tidak ada. Cinta mulai terisak. “Aku takut, aku ingin pulang,” Cinta mulai terisak. Kak Maya memeluknya. “Tenang, Kakak di sini.”<br><br>“Mobilnya tidak mungkin jalan sendiri,” kata Kak Maya. Nala mengerutkan kening. “Kak, apa kita benar-benar tersesat?” Kak Maya garuk-garuk kepala. “Maaf. Tapi Kakak janji akan memperbaiki semuanya!”", 
   choices:[{t:"Cari petunjuk", n:"jejakBintang"},{t:"Ikuti sungai", n:"ikutiSungai"},{t:"Buat camp darurat", n:"bikinCamp"}]},
  {id:"ikutiTupai", text:"Kalian mengikuti tupai kecil itu. Tupai itu berlari berhenti menoleh ke kalian lalu berlari lagi. Seperti ia ingin kalian mengikutinya. “Dia seperti penunjuk jalan,” kata Dinda takjub. Tupai itu membawa kalian ke sebuah pohon besar dengan lubang di batangnya. Di dalam lubang itu ada sebuah kotak bekal!<br><br>“Bekal kita!” seru Mimi. Rara membuka kotak itu. Roti buah dan minuman. Lengkap! Ada juga catatan: MAKANLAH. KALIAN MEMBUTUHKAN ENERGI.<br><br>Jadi siapa yang mengatur ini semua tanya Cinta. Kak Maya mengamati catatan itu. Tulisan ini sepertinya familiar. Dinda setuju. Baik jika ini semua permainan ayo kita menangkan!", 
   choices:[{t:"Makan dulu lanjut", n:"istirahatMakan"},{t:"Langsung cari petunjuk", n:"jejakBintang"}]},
  {id:"istirahatSungai", text:"Kalian duduk di pinggir sungai. Airnya sejuk dan menyegarkan. Rara mencelupkan kakinya. “Enak sekali!” Nala bermain melempar batu ke air. Dinda membaca buku. Mimi tertidur di pangkuan Kak Maya.<br><br>“Kak,” tanya Nala tiba-tiba. “Menurut Kakak, apakah ini serius?” Apakah kita benar-benar tersesat? Kak Maya diam sejenak. “Sejujurnya, Kakak juga tidak tahu. Tapi satu hal yang Kakak tahu: selama kita bersama, kita pasti bisa melewatinya.”<br><br>Tiba-tiba Mimi terbangun. “Aku bermimpi ada kue!” Semua tertawa. Suasana mencair. Kalian tertawa bersama di pinggir sungai melupakan ketakutan sejenak.", 
   choices:[{t:"Cari jalan pulang", n:"jejakBintang"},{t:"Buat camp dari ranting", n:"bikinCamp"}]},
  {id:"bukaBagasi", text:"Kalian mencoba membuka bagasi mobil. Nala menggunakan jepit rambut milik Rara sebagai alat. Kak Maya mencari tuas darurat. Dinda membaca buku manual mobil. Akhirnya Kak Maya ingat ada tombol darurat di dalam kabin. Rara menekannya! BAGASI TERBUKA!<br><br>Namun di dalam bagasi bukan bekal yang mereka temukan. Ada sebuah peti kayu kecil dengan tulisan: UNTUK KELOMPOK PEMBERANI. Di atasnya ada gambar bintang yang sama seperti di pohon.<br><br>“Ini petunjuk!” seru Dinda. Di dalam peti ada peta sederhana dan sebuah kompas kecil. Peta itu menunjukkan jalur dari mobil menuju sebuah titik bertanda X. “Sepertinya ini sudah diatur,” kata Kak Maya sambil tersenyum.",
   choices:[{t:"Ikuti peta ke titik X", n:"jejakBintang"},{t:"Simpan peti dan tetap di mobil", n:"diamMobil"}]},
  {id:"cariMakan", text:"Kalian turun dari mobil dan mencari makanan. Nala memetik buah-buahan liar yang Dinda nyatakan aman. Rara menemukan pohon jambu. Mimi mengumpulkan kacang-kacangan. Kak Maya mencoba membuat api dari batu dan ranting.<br><br>Tiba-tiba dari kejauhan terdengar suara musik. Suara itu semakin dekat. Dan dari balik pepohonan muncul rombongan anak-anak dengan guru mereka!<br><br>Eh kalian kok di sini tanya seorang guru. Ini lokasi wisata! Hari ini kita belajar survival! Semua terdiam. Lalu tertawa. Ternyata kalian hanya salah jalan sedikit. Dan hutan ini adalah area perkemahan! Kak Maya menghela napas lega.",
   choices:[{t:"SELAMAT Main lagi", n:"start"}]},
  {id:"telponOrtu", text:"Kak Maya mencoba menelepon orang tua. Tidak ada sinyal. Dicoba lagi. Tidak ada. Mimi mulai merengek. “Kak, aku ingin pulang.”<br><br>Namun tiba-tiba terdengar suara klakson dari luar mobil. Semua terkejut. Sebuah mobil guru berhenti di dekat mereka. Seorang guru turun. “Maya, kamu lagi-lagi tersesat ya?” Kak Maya tersipu malu. “Maaf, Pak Guru. Google Maps-nya yang salah.”<br><br>Ternyata sekolah sudah mencari kalian sejak tadi. Kalian naik ke mobil guru menuju lokasi perkemahan yang benar. Sesampainya di sana api unggun sudah menyala dan teman-teman lain sudah menunggu.",
   choices:[{t:"SELAMAT Main lagi", n:"start"}]},
  {id:"pos2", text:"Kalian berjalan ke utara. Jalanan semakin menanjak. Mimi sudah kehabisan napas. Rara juga mulai lelah. Namun Nala terus memotivasi. “Ayo, sebentar lagi! Kita pasti bisa!”<br><br>Sesampainya di Pos 2 ada tenda yang lebih besar. Di dalamnya ada bantal-bantal empuk selimut hangat dan paket makanan! “Ini tempat istirahat!” seru Mimi, lupa akan kelelahannya.<br><br>Kak Maya tersenyum. “Mungkin dua-duanya. Tapi yang pasti, kita hebat karena kita bersama.” Di atas meja ada sebuah amplop. Dinda membukanya. Selamat! Kalian lulus ujian keberanian. Silakan nikmati picnic di Pos 3. Kalian melihat ke luar. Lampu-lampu kuning berkelap-kelip di pepohonan.",
   choices:[{t:"Ikuti lampu ke Pos 3", n:"pos3"},{t:"Istirahat dulu besok lanjut", n:"istirahatMalam"}]},
  {id:"tungguTenda", text:"Kalian memutuskan untuk menunggu di tenda. Rara berswafoto di depan tenda. Dinda membaca buku. Mimi tidur lagi. Cinta tetap waspada. Nala gelisah.<br><br>Satu jam berlalu. Tidak ada yang datang. Nala mulai gelisah. Kak sepertinya tidak ada yang menjemput kita. Kita harus bergerak. Kak Maya mengangguk. Baik lima belas menit lagi kita cari jalan sendiri.<br><br>Tepat lima belas menit kemudian dari kejauhan terdengar suara orang memanggil. Beberapa guru berjalan mendekat. Syukurlah! Kami mencari kalian! Kalian semua bersorak kegirangan!",
   choices:[{t:"SELAMAT Main lagi", n:"start"}]},
  {id:"eksplorasiTenda", text:"Kalian menjelajahi sekitar tenda. Di balik tenda ada papan besar dengan foto-foto lucu. Foto-foto kalian sejak berangkat tadi: sedang tidur di mobil sedang bingung di hutan sedang makan kue. “Hah? Kapan ini difoto?” Rara terkejut. Di bawah foto ada tulisan: TIM GIRLS DAY OUT PALING KOMPAK.<br><br>Dinda menemukan kamera tersembunyi di pohon. Kak Maya tiba-tiba terkikik. “Iya, Kakak yang memasangnya.” Rara melotot. “KAK?!” Kak Maya tersenyum lebar. “Maaf-maaf!” Kakak ingin mendokumentasikan petualangan kalian!<br><br>Dari kejauhan terdengar suara api unggun. Tapi Kak Maya kan di sini? “Itu rekaman,” kata Kak Maya. “Kakak memasang speaker di lokasi picnic agar kalian memiliki tujuan.”",
   choices:[{t:"SELAMAT Main lagi", n:"start"}]},
  {id:"ikutiSungai", text:"Kalian mengikuti aliran sungai. Airnya mengalir deras namun ada bebek-bebek lucu yang berenang di sana. Mimi berhenti untuk memberi mereka nama. Rara tertawa. “Mi, kita sedang mencari jalan, bukan membuka peternakan bebek!”<br><br>Namun menelusuri sungai membawa kalian ke sebuah jembatan kecil. Di jembatan itu ada spanduk: SELAMAT DATANG DI POS 2 - LOMBATI RINTANGAN! Di bawahnya ada berbagai rintangan lucu: ban bekas untuk dilompati jaring laba-laba dari tali dan kolam kecil berisi bola plastik!<br><br>“INI SERU SEKALI!” teriak Nala, langsung melompat ke kolam bola. Yang lain ikut. Bahkan Cinta yang penakut akhirnya ikut melompat. Kak Maya merekam semuanya dengan ponselnya.",
   choices:[{t:"Main rintangan dulu", n:"pos2"},{t:"Lanjut cari jalan pulang", n:"pos3"}]},
  {id:"bikinCamp", text:"Kalian memutuskan untuk mendirikan camp sementara. Kak Maya mengajari kalian cara membuat tenda darurat dari kain dan ranting. Nala dan Rara mencari kayu bakar. Dinda dan Mimi mengatur dapur darurat. Cinta menjaga api unggun. Kerja sama tim yang sangat kompak.<br><br>Saat matahari mulai terbenam kalian duduk melingkar di sekitar api unggun. Rara mulai bercerita tentang hantu dan langsung ditutup mulutnya oleh Cinta yang sudah ketakutan. Semua tertawa.<br><br>“Kak,” kata Nala tiba-tiba. “Terima kasih sudah menjaga kami.” Kak Maya tersenyum. “Kakak juga berterima kasih. Kalian hebat.” Kalian berpelukan. Api unggun menghangatkan tubuh dan hati. Kadang tersesat mengajarkan kita untuk menemukan jalan pulang dan menemukan arti persahabatan.",
   choices:[{t:"SELAMAT Main lagi", n:"start"}]},
  {id:"istirahatMakan", text:"Kalian makan bekal dengan lahap. Roti lapis buah potong dan kue. Kak Maya memastikan semua kebagian. Setelah makan semangat baru muncul. Kalian siap melanjutkan perjalanan dengan energi yang pulih.", 
   choices:[{t:"Lanjut cari petunjuk", n:"jejakBintang"}]},
  {id:"istirahatMalam", text:"Kalian memutuskan untuk bermalam di Pos 2. Kak Maya mendirikan tenda. Nala dan Rara mengatur api unggun. Dinda membacakan cerita seru. Mimi dan Cinta tidur berpelukan. Malam itu kalian merasa aman karena bersama-sama. Keesokan paginya petualangan baru akan menanti.",
   choices:[{t:"SELAMAT Main lagi", n:"start"}]},
  {id:"pos3", text:"Kalian mengikuti lampu-lampu kecil di pohon. Jalannya berkelok namun terang dan aman. Setiap lampu seperti bintang kecil yang memandu. Rara bersenandung Mimi menari-nari. Suasana hati semua membaik.<br><br>Akhirnya kalian sampai di lapangan terbuka. Di sana tenda besar dan api unggun sudah menyala. Sebuah spanduk bertuliskan: SELAMAT DATANG DI GIRLS DAY OUT SERU! Namun yang paling mengejutkan Kak Maya sudah berdiri di sana dengan senyum lebar. Padahal tadi dia bersama kalian.<br><br>“Kak?! Kok Kakak sudah di sini?” tanya Rara. Kak Maya tertawa. “Kalian mengira Kakak benar-benar tersesat?” Google Maps-nya sengaja diatur menuju jalur scavenger hunt! Bukan camping biasa! Kakak sudah menyiapkan petualangan ini dari semalam!<br><br>Nala terkejut. “Jadi, semua petunjuk di pohon, tenda, kue, dan lampu-lampu itu...” Kak Maya mengangguk. “Semua Kakak yang buat.” Kakak ingin kalian memiliki petualangan seru.<br><br>Rara memeluk Kak Maya. “Kak! Kakak licik! Tapi keren sekali!” Semua tertawa. Kak Maya mengeluarkan marshmallow dan cokelat. Mimi sudah berteriak kegirangan. Cinta yang tadinya penakut kini tersenyum lebar.<br><br>Kak Maya duduk di samping mereka. “Bagaimana, seru?” Nala mengangguk. Kak, Kakak adalah mahasiswa baru paling keren sedunia. Kak Maya tersenyum hangat. Girls day out resmi dimulai, adik-adik!!",
   choices:[{t:"SELAMAT Main lagi", n:"start"}]}
];

function go(id) {
  for(var i=0;i<story.length;i++) {
    if(story[i].id==id) {
      var n=story[i];
      document.getElementById("story").innerHTML=n.text;
      var c=document.getElementById("choices");
      c.innerHTML="";
      if(id=="start") document.getElementById("badge").textContent="BERANGKAT";
      else if(n.text.indexOf("SELAMAT")>=0) document.getElementById("badge").textContent="SELESAI!";
      else document.getElementById("badge").textContent="PETUALANGAN";
      for(var j=0;j<n.choices.length;j++) {
        var b=document.createElement("button");
        b.className="btn";
        b.textContent=n.choices[j].t;
        b.onclick=function(j){return function(){go(n.choices[j].n)}}(j);
        c.appendChild(b);
      }
      return;
    }
  }
}
go("start");
</script>
</body>
</html>
