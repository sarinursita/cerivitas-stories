<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Petualangan Field Trip - CYOA</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:linear-gradient(135deg,#ff9a9e,#fad0c4);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;font-family:'Segoe UI','Comic Sans MS',sans-serif}
.game{background:#fff;border-radius:24px;padding:30px;max-width:650px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,0.15)}
h1{text-align:center;color:#ff6b6b;font-size:28px;margin-bottom:2px}
.sub{text-align:center;color:#888;font-size:13px;margin-bottom:15px;font-style:italic}
.badge{background:linear-gradient(135deg,#ff6b6b,#ee5a24);color:#fff;padding:4px 14px;border-radius:20px;font-size:12px;display:inline-block;margin-bottom:12px;font-weight:bold}
.story{background:#fef9f0;border:2px solid #ffe0d0;border-radius:16px;padding:22px;min-height:260px;margin-bottom:18px;font-size:16px;line-height:1.8;color:#444;text-align:justify}
.choices{display:flex;flex-direction:column;gap:8px}
.btn{background:linear-gradient(135deg,#ff6b6b,#ee5a24);color:#fff;border:none;border-radius:12px;padding:13px 20px;font-size:15px;cursor:pointer;text-align:left;transition:.2s}
.btn:hover{transform:translateX(5px);box-shadow:0 6px 20px rgba(255,107,107,0.4)}
.reset{background:#636e72;color:#fff;border:none;border-radius:10px;padding:10px;font-size:13px;cursor:pointer;width:100%;margin-top:14px}
</style>
</head>
<body>
<div class="game">
<h1>Petualangan Field Trip</h1>
<p class="sub">5 sahabat + 1 kakak. Satu mobil mungil. Satu petualangan yang tidak akan pernah terlupakan.</p>
<div class="badge" id="badge">BERANGKAT!</div>
<div class="story" id="story">[Memuat cerita...]</div>
<div class="choices" id="choices"></div>
<button class="reset" onclick="go('start')">MULAI LAGI</button>
</div>
<script>
var S={
start:{text:"Hari ini field trip kelas 5 ke Museum Sejarah Alam! Aku Nala, si paling pemberani. Empat sahabatku ikut: Rara si centil suka selfie, Dinda si kutu buku, Mimi si pelupa lucu, dan Cinta si penakut. Kak Maya—kakaknya Rara umur 19—ikut sebagai pendamping. Kata Kak Maya sih biar hemat ongkos. Jadilah kami bertujuh masuk ke mobil mungil Kak Maya. Nala di depan, Rara, Dinda, Mimi, dan Cinta berdesakan di belakang. Rara sudah mulai ambil angle selfie sejak mobil jalan.<br><br>Kak Maya nyetel Google Maps di HP, tempel di dashboard, dan jalan. 'Santai aja, adik-adik. Kakak bawa kalian ke museum dengan selamat!' Semua percaya. Dua puluh menit pertama lancar. Sampai Kak Maya belok kiri di pertigaan yang salah. 'Belok kiri, Pak. Terus lurus. Belok kanan.' Sempat lancar 10 menit. Sampai akhirnya kami masuk ke jalan tanah yang makin lama makin sempit. 'Kak... yakin ini jalur yang bener?' tanya Mimi. 'Iya, iya, ini jalan pintas,' jawab Kak Maya, matanya tetap di HP.<br><br>Tiba-tiba HP Kak Maya mati. Baterai habis. Mukanya langsung pucat. 'Eh...' Bus berhenti. Kami di tengah hutan. Kak Maya makin bingung. Dinda melihat Maps di HP-nya sendiri. 'Kak... ini jalannya enggak ada di peta.' Kak Maya cengar-cengir. 'Maps-nya ngaco.' Rara menghela napas. 'Kak...'<br><br>Kak Maya berdiri dengan percaya diri. 'Oke, oke. Kakak salah. Tapi kakak akan perbaiki. Kita jalan kaki aja. Pasti ada jalan.' Cinta hampir menangis. 'Kak... kita tersesat di hutan?' Kak Maya memeluknya. 'Kita tidak tersesat, sayang. Kita sedang... berpetualang.' Semua terdiam. Lalu Mimi berkata, 'Kak, lo lucu deh.'",choices:[{text:"Ikuti Kak Maya cari jalan keluar",next:"ikutiKak"},{text:"Nala pimpin tim! Jelajah hutan",next:"nalaPimpin"},{text:"Diam di bus dan tunggu pertolongan",next:"diamBus"}]},
ikutiKak:{text:"Kalian mengikuti Kak Maya masuk ke hutan. Pepohonan tinggi menjulang. Suara burung aneh terdengar dari kejauhan. Rara sudah mengeluarkan HP untuk selfie. 'Kak, fotoin aku dong!' Kak Maya tersenyum, 'Ra, kita lagi nyari jalan, bukan foto-foto.' Tapi Rara tetap bergaya di depan pohon besar.<br><br>'Hei, lihat ini!' seru Dinda sambil menunjuk ke sebuah papan kayu lapuk. Ada tulisan: 'POS 1 - IKUTI JEJAK BINTANG.' 'Ini... petunjuk!' seru Mimi. 'Seperti treasure hunt!' Kalian bersemangat. Tapi Cinta bertanya, 'Siapa yang buat petunjuk ini?'<br><br>Kak Maya memeriksa papan itu. 'Kayaknya ini sengaja dibuat. Mungkin ini bagian dari field trip yang dirahasiakan.' Nala sudah berlari ke depan. 'Ayo ikut jejaknya!'",choices:[{text:"Ikuti jejak bintang",next:"jejakBintang"},{text:"Cari tahu dulu siapa yang buat",next:"cariTahu"},{text:"Lebih baik balik ke bus",next:"balikBus"}]},
nalaPimpin:{text:"Nala mengambil alih. 'Oke, tim! Aku yang pimpin! Cinta, pegang tangan Mimi biar enggak nyasar. Rara, matiin HP dulu, baterai bisa habis. Dinda, buka maps offline. Kak Maya, jaga belakang!' Kalian berjalan dalam formasi. Seru kayak film petualangan!<br><br>Setelah berjalan 10 menit, kalian menemukan sebuah sungai kecil. Airnya jernih. 'Kita ikuti sungai aja,' kata Nala. 'Sungai pasti berujung ke pemukiman.' Tapi Dinda menggeleng. 'Maps-ku enggak ada sungai di sini. Sungai ini... enggak ada di peta.'<br><br>Mimi mendadak bersin. 'Ha... ha... HATCHO!' Dari balik semak, suara gemerisik. 'A-ada apa itu?' Cinta merapat ke Kak Maya. Dari balik dedaunan, seekor tupai kecil melompat keluar dan berlari ke arah sungai. Semua tertawa lega. Tapi di batang pohon tempat tupai itu berasal, ada ukiran bintang.",choices:[{text:"Cek ukiran bintang",next:"jejakBintang"},{text:"Ikuti tupai itu",next:"ikutiTupai"},{text:"Istirahat dulu di pinggir sungai",next:"istirahatSungai"}]},
diamBus:{text:"Kalian memutuskan tetap di mobil. Kak Maya setuju. 'Lebih aman menunggu daripada nyasar.' Rara mengomel, 'Bosan! Mau foto-foto dong!' Ia jepret-jepret selfie di dalam mobil. Dinda membaca buku petunjuk bertahan hidup. Mimi membuka jendela karena gerah. Cinta duduk diam memeluk bonekanya.<br><br>Tapi setelah 20 menit, tidak ada yang datang. 'Kak... aku lapar,' rengek Mimi. 'Kita punya bekal, kan?' Rara membuka ranselnya. Kosong. Dinda juga. Semua ransel kosong!<br><br>'Tadi Kakak taruh bekal di bagasi mobil,' ingat Kak Maya. 'Tapi kuncinya...' Kak Maya cek kantong. 'Ketinggalan di dalam mobil.' Kalian semua terdiam. Terjebak tanpa kunci mobil dan tanpa makanan.",choices:[{text:"Cari cara buka bagasi",next:"bukaBagasi"},{text:"Tinggalkan bus dan cari makanan",next:"cariMakan"},{text:"Telepon orang tua",next:"telponOrtu"}]},
jejakBintang:{text:"Kalian mengikuti jejak bintang yang terukir di pohon-pohon. Satu bintang, dua bintang, tiga bintang... Setiap 20 langkah selalu ada bintang baru. Rara yang paling semangat. 'Ini kayak di film! Petualangan sungguhan!' Ia berlari-lari kecil. Dinda mencatat setiap bintang di buku catatannya.<br><br>Bintang ke-7 membawa kalian ke sebuah tempat terbuka. Di tengahnya, ada tenda kecil berwarna merah. Di depan tenda, ada meja piknik dengan... sepiring kue! 'KUE!' seru Mimi berlari. 'Tunggu! Ini bisa jebakan!' teriak Cinta. Tapi Nala sudah memegang kue itu. 'Wangi banget... kayak buatan Ibu.'<br><br>Di meja ada catatan: 'SELAMAT! KALIAN MENEMUKAN POS 1. ISTIRAHAT DAN MAKAN. LANJUTKAN PERJALANAN KE UTARA UNTUK POS 2.' Kak Maya membaca catatan itu. 'Sepertinya ini memang treasure hunt yang diatur sekolah.' Kalian makan kue dengan lahap. Cinta akhirnya tersenyum.",choices:[{text:"Lanjut ke Pos 2 (utara)",next:"pos2"},{text:"Tunggu di tenda, mungkin ada yang jemput",next:"tungguTenda"},{text:"Eksplorasi sekitar tenda",next:"eksplorasiTenda"}]},
cariTahu:{text:"Kamu dan Kak Maya memeriksa papan petunjuk. 'Lihat, Kak. Ada stiker logo sekolah di pojok.' Kak Maya melihat lebih dekat. 'Bener. Logo SMP Bumi Angkasa.' Kalian tersenyum lega. 'Ini pasti kegiatan sekolah yang dirahasiakan. Mungkin tes keberanian.'<br><br>Nala sudah tidak sabar. 'Ayo ikuti jejaknya! Ini seru!' Rara setuju. 'Iya! Nanti bisa jadi konten TikTok!' Dinda menggeleng. 'Konten TikTok... dasar.'<br><br>Kalian berjalan beriringan mengikuti jejak bintang. Hutan yang tadinya menyeramkan kini terasa seperti taman bermain. Bahkan Cinta mulai berani dan ikut bernyanyi lagu-lagu yang dinyanyikan Mimi.",choices:[{text:"Ikuti jejak bintang",next:"jejakBintang"}]},
balikBus:{text:"Kalian memutuskan balik ke mobil. Tapi... mobilnya tidak ada! Di tempat mobil diparkir, hanya ada bekas ban. 'Hah? Mobilnya ke mana?' Nala bingung.<br><br>Dinda mengeluarkan HP. 'Enggak ada sinyal.' Rara mencoba menelepon. 'Juga enggak.' Cinta mulai terisak. 'Aku takut... aku mau pulang...' Kak Maya memeluknya. 'Tenang, sayang. Kakak di sini.'<br><br>'Mobilnya... gak bisa mundur?' kata Kak Maya. Nala melotot. 'Kak... lo yakin kita gak nyasar?' Kak Maya garuk-garuk kepala. 'Hehe... maaf. Tapi kakak janji bakal baikin semuanya!' Kalian saling pandang. 'Kalau gitu... kita harus bikin mereka bangga!' seru Nala.",choices:[{text:"Cari petunjuk sekolah",next:"jejakBintang"},{text:"Ikuti sungai",next:"ikutiSungai"},{text:"Buat camp sementara",next:"bikinCamp"}]},
ikutiTupai:{text:"Kalian mengikuti tupai kecil itu. Tupai itu berlari-lari, berhenti, menoleh ke kalian, lalu berlari lagi. Seperti dia ingin kalian mengikutinya. 'Dia kayak penunjuk jalan,' kata Dinda takjub. Tupai itu membawa kalian ke sebuah pohon besar dengan lubang di batangnya. Di dalam lubang... ada kotak bekal!<br><br>'Bekal kita!' seru Mimi. 'Tapi kok bisa di sini?' Rara membuka kotak itu. Roti, buah, dan minuman. Lengkap. Ada juga catatan: 'MAKANLAH. KALIAN BUTUH ENERGI UNTUK PETUALANGAN BERIKUTNYA.'<br><br>'Jadi... siapa yang ngatur ini semua?' tanya Cinta. Kak Maya mengamati catatan itu. 'Tulisan ini... kayak tulisan Ibu Guru.' Dinda setuju. 'Iya! Bu Guru tulisannya miring ke kanan!' Kalian tersenyum. 'Oke, kalau ini semua permainan... ayo kita menangkan!'",choices:[{text:"Makan dulu lalu lanjut",next:"istirahatMakan"},{text:"Langsung cari petunjuk berikutnya",next:"jejakBintang"}]},
istirahatSungai:{text:"Kalian duduk di pinggir sungai. Airnya sejuk. Rara mencelupkan kaki. 'Enak banget!' Nala mencoba melempar batu ke air. Dinda membaca buku. Mimi... tidur di pangkuan Kak Maya. Cinta duduk dekat Kak Maya, masih waspada.<br><br>'Kak,' tanya Nala tiba-tiba. 'Menurut Kakak, ini serius enggak sih? Kita beneran nyasar?' Kak Maya diam sejenak. 'Sejujurnya... Kakak juga enggak tahu. Tapi satu hal yang Kakak tahu: selama kita bersama, kita pasti bisa.'<br><br>Tiba-tiba, Mimi terbangun. 'Aku mimpi ada kue!' Semua tertawa. Suasana mencair. Kalian tertawa bersama di pinggir sungai, melupakan ketakutan sejenak. Persahabatan memang obat terbaik.",choices:[{text:"Cari jalan pulang bersama",next:"jejakBintang"},{text:"Bangun benteng dari ranting",next:"bikinCamp"}]},
bukaBagasi:{text:"Kalian mencoba membuka bagasi mobil. Nala mencoba menggunakan jepit rambut Rara. Kak Maya mencari tuas darurat. Dinda membaca manual mobil yang ditemukan di dashboard. Akhirnya Kak Maya ingat ada tombol darurat di dalam. Rara menekannya! BAGASI TERBUKA!<br><br>Tapi di dalam bagasi, bukan bekal yang mereka temukan. Ada sebuah peti kayu kecil dengan tulisan: 'UNTUK KELOMPOK PEMBERANI.' Di atasnya ada gambar bintang.<br><br>'Ini petunjuk!' seru Dinda. Di dalam peti ada peta sederhana dan kompas. Peta itu menunjuk ke titik X. 'Kayaknya sekolah memang sengaja ngatur ini,' kata Kak Maya. 'Field trip kali ini beneran jadi petualangan.'",choices:[{text:"Ikuti peta ke titik X",next:"jejakBintang"},{text:"Ambil peti dan balik ke dalam bus",next:"diamBus"}]},
cariMakan:{text:"Kalian turun dari bus dan mencari makanan. Nala memetik buah-buahan liar—yang Dinda katakan aman. Rara menemukan pohon jambu. Mimi memunguti kacang-kacangan. Kak Maya membuat api dari batu dan ranting. Cinta duduk di pinggir, menjaga barang-barang.<br><br>Tiba-tiba, dari kejauhan, terdengar suara musik. 'Ada apa itu?' tanya Cinta. Suara itu semakin dekat. Dan dari balik pepohonan, muncullah... rombongan anak-anak dari kelas lain dengan guru mereka!<br><br>'Eh? Kalian kok di sini?' tanya seorang guru. 'Ini lokasi kemah field trip! Hari ini kita belajar survival!' Semua terdiam. Lalu tertawa. Ternyata bus kalian hanya salah jalan sedikit. Dan hutan ini... adalah area perkemahan sekolah! Yang membuat kalian tersesat hanyalah kesalahan kecil Pak Sopir! Rara selfie dengan guru, Mimi langsung minta makanan, dan Kak Maya menghela napas lega.",choices:[{text:"SELAMAT! Main lagi?",next:"start"}]},
telponOrtu:{text:"Kakak Maya mencoba menelepon orang tua. Tidak ada sinyal. Diulang. Tidak ada. Mimi mulai merengek. 'Kak... aku mau pulang...' Rara menenangkan, 'Tenang, Mi, kita pasti pulang.'<br><br>Tapi kemudian, dari luar bus, terdengar suara klakson. BUK! BUK! Semua terkejut. Kalian melihat ke luar. Sebuah mobil guru berhenti. 'Maya! Kamu lagi-lagi nyasar ya?' Kak Maya malu setengah mati. 'Maaf, Pak Guru... lagi-lagi Google Maps yang salah.'<br><br>Kalian semua bersorak! Ternyata sekolah sudah mencari kalian sejak tadi. Ponsel tidak ada sinyal karena di hutan, tapi tim pencarian sudah dikirim. Kalian naik jeep menuju lokasi kemah yang benar. Sesampainya di sana, api unggun sudah menyala, dan teman-teman lain sudah menunggu.",choices:[{text:"SELAMAT! Main lagi?",next:"start"}]},
pos2:{text:"Kalian berjalan ke utara. Jalanannya makin menanjak. Mimi sudah ngos-ngosan. 'Capek...' Rara juga mulai lelah. Tapi Nala terus memotivasi. 'Ayo, tinggal sedikit lagi! Kita pasti bisa!' Dinda membaca kompas. 'Kita sudah dekat.'<br><br>Sesampainya di Pos 2, ada tenda lebih besar. Di dalamnya, ada bantal-bantal empuk, selimut, dan... paket makanan! 'Ini... tempat istirahat!' seru Mimi lupa lelah. Kalian masuk dan beristirahat. Cinta duduk di pojok, berpikir. 'Kak... menurut Kakak, ini semua diatur? Atau kita benar-benar beruntung?'<br><br>Kak Maya tersenyum. 'Mungkin dua-duanya. Tapi yang pasti... kita hebat karena kita bersama.' Di atas meja, ada sebuah amplop. Dinda membukanya. 'Selamat! Kalian lulus ujian keberanian. Silakan nikmati api unggun di Pos 3. Ikuti lampu-lampu kecil di pohon.' Kalian melihat ke luar. Lampu-lampu kuning berkelap-kelip di pepohonan, membentuk jalan setapak.",choices:[{text:"Ikuti lampu ke Pos 3",next:"pos3"},{text:"Istirahat dulu, besok lanjut",next:"istirahatMalam"}]},
tungguTenda:{text:"Kalian memutuskan menunggu di tenda. Siapa tahu ada yang jemput. Rara selfie di depan tenda. Dinda membaca buku. Mimi tidur lagi. Cinta menjaga pandangan. Nala tidak sabar. Kak Maya mengawasi.<br><br>Satu jam berlalu. Tidak ada yang datang. Nala mulai gelisah. 'Kak, kayaknya enggak ada yang jemput. Kita harus gerak.' Kak Maya mengangguk. 'Oke, 15 menit lagi kita cari jalan sendiri.'<br><br>Tapi tepat 15 menit kemudian, dari kejauhan, terdengar suara orang memanggil. 'HALO! APA KALIAN DI SINI?' Suara orang dewasa. Beberapa guru berjalan mendekat. 'Syukurlah! Kami mencari kalian!' Guru-guru itu tersenyum. 'Maaf, ada kesalahan komunikasi. Bus kalian salah jalur. Ayo, kita antar ke lokasi kemah!' Kalian semua bersorak!",choices:[{text:"SELAMAT! Main lagi?",next:"start"}]},
eksplorasiTenda:{text:"Kalian menjelajahi sekitar tenda. Di balik tenda, ada papan besar dengan foto-foto lucu. Foto-foto kalian berenam ketika sedang tidur di bus! 'Hah? Kapan ini difoto?' Rara terkejut. Di bawah foto, ada tulisan: 'TIM PALING KOMPAK DARI KELAS 5 - DIBUKTIKAN MALAM INI.'<br><br>'Ini pasti ulah panitia,' kata Kak Maya sambil tertawa. 'Mereka diam-diam memotret kita.' Dinda menemukan kamera tersembunyi di pohon. 'Ini buktinya.'<br><br>Dari kejauhan, terdengar suara api unggun. Dan suara teman-teman sekelas menyanyi. 'Sepertinya field trip beneran sudah menunggu kita,' kata Nala. 'Ayo gabung!' Kalian berlari ke arah suara. Ternyata area kemah utama hanya 50 meter dari tenda! Semua ini hanya petualangan singkat yang penuh tawa.",choices:[{text:"SELAMAT! Main lagi?",next:"start"}]},
ikutiSungai:{text:"Kalian mengikuti sungai. Airnya mengalir deras—tapi ada bebek-bebek lucu berenang di sana. Mimi berhenti untuk memberi bebek nama. 'Itu Bebek Adi, Bebek Budi, Bebek Caca...' Rara tertawa. 'Mi, kita lagi nyari jalan, bukan buka peternakan bebek!'<br><br>Tapi menelusuri sungai membawa kalian ke sebuah jembatan kecil. Di jembatan, ada spanduk: 'SELAMAT DATANG DI POS 2 - LOMBATI RINTANGAN!'. Di bawahnya, ada berbagai rintangan lucu: ban bekas untuk dilompati, jaring laba-laba dari tali, dan... kolam kecil berisi bola plastik!<br><br>'INI SERU BANGET!' teriak Nala, langsung melompat ke kolam bola. Yang lain ikut. Bahkan Cinta yang penakut akhirnya ikut melompat. Kak Maya merekam semuanya dengan HP. Ternyata field trip ini memang sudah dirancang penuh kejutan!",choices:[{text:"Main rintangan dulu!",next:"pos2"},{text:"Lanjut cari jalan pulang",next:"pos3"}]},
bikinCamp:{text:"Kalian memutuskan untuk membuat camp sementara. Kak Maya mengajari kalian cara mendirikan tenda darurat dari kain dan ranting. Nala dan Rara mencari kayu bakar. Dinda dan Mimi mengatur 'dapur'. Cinta menjaga api. Kerja sama tim yang kompak!<br><br>Saat matahari mulai terbenam, kalian duduk melingkar di sekitar api unggun. Rara mulai bercerita soal hantu—dan langsung ditutup mulutnya oleh Cinta yang sudah ketakutan. Semua tertawa. Mimi membagikan kue yang 'ajaib' muncul di ranselnya (ternyata Kak Maya yang menyembunyikannya).<br><br>'Kak,' kata Nala tiba-tiba. 'Makasih ya udah jagain kita.' Kak Maya tersenyum. 'Kakak juga makasih. Kalian hebat. Kalau enggak ada kalian, Kakak mungkin panik sendiri.' Kalian berpelukan. Api unggun menghangatkan tubuh dan hati. Mungkin tersesat tidak selalu buruk. Kadang, tersesat mengajarkan kita untuk menemukan jalan pulang—dan menemukan arti persahabatan.",choices:[{text:"SELAMAT! Main lagi?",next:"start"}]},
istirahatMakan:{text:"Kalian makan bekal dengan lahap. Roti lapis, buah potong, dan kue. Kak Maya memastikan semua kebagian. Selesai makan, semangat baru muncul. Kalian siap melanjutkan perjalanan.",choices:[{text:"Lanjut cari petunjuk",next:"jejakBintang"}]},
istirahatMalam:{text:"Kalian memutuskan bermalam di Pos 2. Kak Maya mendirikan tenda. Nala dan Rara mengatur api unggun. Dinda membaca cerita seru. Mimi dan Cinta tidur berpelukan. Malam itu, kalian merasa aman karena bersama-sama. Besok pagi, petualangan baru menanti.",choices:[{text:"SELAMAT! Main lagi?",next:"start"}]},
pos3:{text:"Kalian mengikuti lampu-lampu kecil di pohon. Jalannya berkelok, tapi terang dan aman. Setiap lampu seperti bintang kecil yang memandu. Rara bersenandung, Mimi menari-nari. Suasana hati semua membaik.<br><br>Dan akhirnya... kalian sampai! Lapangan terbuka dengan api unggun besar di tengahnya. Teman-teman sekelas sudah berkumpul. Guru-guru tersenyum. 'Selamat! Kalian lulus ujian keberanian field trip!'<br><br>Ternyata Google Maps Kak Maya emang lagi error hari itu. Untungnya guru-guru sudah curiga dan mencari kami. Setiap pos sudah dijaga oleh guru. Kalian tidak pernah benar-benar dalam bahaya.<br><br>Kakak Maya memeluk kalian semua. 'Kalian hebat. Kakak bangga.' Rara selfie dengan latar api unggun. Mimi langsung mencari makanan. Dinda menulis jurnal. Nala dan Cinta duduk berdampingan, menatap api unggun. 'Ini field trip terbaik ever!'",choices:[{text:"SELAMAT! Main lagi?",next:"start"}]}
};
function go(id){var n=S[id];if(!n)return;document.getElementById('story').innerHTML=n.text;var c=document.getElementById('choices');c.innerHTML='';if(id==='start')document.getElementById('badge').textContent='BERANGKAT!';else if(n.text.includes('SELAMAT'))document.getElementById('badge').textContent='SELESAI!';else if(n.text.includes('tenda')||n.text.includes('Tenda'))document.getElementById('badge').textContent='POS 1';else if(n.text.includes('sungai')||n.text.includes('Sungai'))document.getElementById('badge').textContent='SUNGAI';else if(n.text.includes('api'))document.getElementById('badge').textContent='MALAM HARI';else document.getElementById('badge').textContent='PETUALANGAN';n.choices.forEach(function(ch){var b=document.createElement('button');b.className='btn';b.textContent=ch.text;b.onclick=function(){go(ch.next)};c.appendChild(b)});}
go('start');
</script>
</body>
</html>
