<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Misteri Lorong Tersembunyi - CYOA</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:linear-gradient(135deg,#1a1a2e,#16213e,#0f3460);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;font-family:Georgia,'Times New Roman',serif}
.game{background:#fff;border-radius:24px;padding:35px;max-width:700px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,0.4)}
h1{text-align:center;color:#1a1a2e;font-size:28px;border-bottom:3px solid #e94560;padding-bottom:10px;display:inline-block;width:100%}
.sub{text-align:center;color:#888;font-size:14px;margin:10px 0 20px;font-style:italic}
.badge{background:#e94560;color:#fff;padding:6px 16px;border-radius:20px;font-size:13px;display:inline-block;margin-bottom:15px;font-family:'Segoe UI',sans-serif}
.story{background:#f8f5f0;border-left:4px solid #e94560;border-radius:0 16px 16px 0;padding:25px;min-height:300px;margin-bottom:20px;font-size:16px;line-height:1.9;color:#333;text-align:justify}
.choices{display:flex;flex-direction:column;gap:12px}
.btn{background:#16213e;color:#fff;border:none;border-radius:12px;padding:16px 22px;font-size:16px;cursor:pointer;transition:.3s;text-align:left;font-family:'Segoe UI',sans-serif}
.btn:hover{background:#0f3460;transform:translateX(8px);box-shadow:0 6px 20px rgba(15,52,96,0.4)}
.reset{background:#e94560;color:#fff;border:none;border-radius:12px;padding:12px;font-size:15px;cursor:pointer;width:100%;margin-top:18px;font-family:'Segoe UI',sans-serif}
</style>
</head>
<body>
<div class="game">
<h1>Misteri Lorong Tersembunyi</h1>
<p class="sub">Sebuah petualangan detektif untuk penjelajah pemberani</p>
<div class="badge" id="badge">Bab 1: Awal Mula</div>
<div class="story" id="story">Hari pertama di Sekolah Harapan Bangsa. Kamu duduk di bangku paling belakang. Di ujung lorong, pintu kayu tua selalu terkunci. Hari ini, ada yang berbeda.</div>
<div class="choices" id="choices"></div>
<button class="reset" onclick="go('start')">Mulai Petualangan Baru</button>
</div>
<script>
const S={
start:{text:"Hari pertama di Sekolah Harapan Bangsa. Di ujung lorong, di balik pintu kayu tua, terdengar ketukan pelan. Tok tok tok. Di buku catatanmu, seseorang menulis dengan tinta emas: 'Cari aku di balik pintu.'",choices:[{text:"Tanya Bu Ratna soal pintu itu",next:"tanyaGuru"},{text:"Ikuti jejak tinta emas",next:"ikutTinta"},{text:"Ajak sahabatmu Raka",next:"ajakRaka"}]},
tanyaGuru:{text:"Bu Ratna terdiam. 'Pintu itu terkunci sejak 20 tahun lalu. Sejak Guru Pustaka menghilang.' Dari celah pintu, sinar keemasan memancar.",choices:[{text:"Diam-diam selidiki",next:"bukuPesan"},{text:"Foto pintu dengan HP",next:"fotoPintu"}]},
ikutTinta:{text:"Jejak tinta emas membawamu ke pintu kayu itu. Ukiran kunci di pintu bersinar saat kau sentuh. 'Akhirnya kau datang, Detektif.'",choices:[{text:"Buka pintu!",next:"masukPintu"},{text:"Panggil Raka",next:"ajakRaka"}]},
ajakRaka:{text:"Raka bersemangat. 'Lorong rahasia? Kayak di novel misteri!' Kalian berdua ke pintu kayu itu. Raka memegang gagang pintu.",choices:[{text:"Masuk bersama Raka",next:"masukPintu"}]},
bukuPesan:{text:"Tinta emas bertambah: 'Temukan aku di perpustakaan lama, di belakang rak ensiklopedia.' Di halaman buku, ada kunci perak tersembunyi!",choices:[{text:"Ke perpustakaan!",next:"perpustakaan"},{text:"Telepon Raka",next:"ajakRaka"}]},
fotoPintu:{text:"Di foto HP, ukiran kunci bersinar. Pustakawan tua tersenyum. 'Kau pasti yang dicari buku-buku itu. Ikuti aku.'",choices:[{text:"Ikuti pustakawan",next:"perpustakaan2"}]},
masukPintu:{text:"Lorong sempit gelap membentang. Dinding batu bata merah kuno. Di ujung, pintu besi bertuliskan 'Perpustakaan Arsenal'. Kunci perak di sakumu terasa hangat.",choices:[{text:"Pakai kunci perak",next:"perpustakaan"},{text:"Cari jalan alternatif",next:"jalanLain"}]},
perpustakaan:{text:"Kunci masuk sempurna. Pintu terbuka. Ruangan bundar penuh buku dari lantai ke langit-langit! Lampu kristal keemasan. Buku besar di meja menulis sendiri dengan tinta emas: 'Terima kasih telah menemukanku.'",choices:[{text:"Baca buku Arsip Sekolah",next:"bukuArsip"},{text:"Lihat foto di dinding",next:"fotoDinding"}]},
perpustakaan2:{text:"Pustakawan menuntunmu ke rak ensiklopedia Z. 'Dorong rak ini.' Rak bergerak, pintu tersembunyi terbuka. 'Di dalam, kau akan temukan buku Arsip Sekolah. Gunakan dengan bijak.'",choices:[{text:"Masuk!",next:"bukuArsip"}]},
jalanLain:{text:"Kalian buka ventilasi dan merangkak. Di ujung, cahaya keemasan hangat. Kalian berdiri di perpustakaan raksasa! Buku dari lantai ke langit-langit.",choices:[{text:"Buka buku bersinar",next:"bukuBersinar"},{text:"Jelajahi rak",next:"rakBuku"}]},
bukuArsip:{text:"Buku Arsip Sekolah mencatat semua peristiwa sejak 1910. Halaman tentang Guru Pustaka yang menghilang - ternyata ia masuk ke dalam buku ini karena terlalu cinta cerita. 'Kau Detektif sejati. Perpustakaan ini milikmu sekarang. Bawalah teman-temanmu.'",choices:[{text:"SELAMAT! Main lagi?",next:"start"}]},
fotoDinding:{text:"Foto guru pertama 1910 mirip pustakawan tua! 'Pendiri Perpustakaan Arsenal.' Raka bersuit. 'Ini lebih dari seratus tahun yang lalu!' Pesan di balik foto: 'Kuncimu adalah milikmu selamanya.'",choices:[{text:"Kembali ke buku Arsip",next:"bukuArsip"}]},
bukuBersinar:{text:"Buku bersinar menulis sendiri: 'Kau telah menunjukkan keberanian dan kebaikan hati. Perpustakaan Arsenal sekarang milikmu. Jagalah ia.' Raka bersorak. Kalian punya perpustakaan rahasia sendiri!",choices:[{text:"SELAMAT! Main lagi?",next:"start"}]},
rakBuku:{text:"Satu buku berjudul 'Sejarah Sekolah' jatuh. Foto anak laki-laki di depan pintu kayu. Di belakang foto: 'Untuk penerusku - temukan Arsip, temukan dirimu.'",choices:[{text:"Baca buku harian",next:"bukuArsip"}]}
};
function go(id){const n=S[id];if(!n)return;document.getElementById('story').innerHTML=n.text;const c=document.getElementById('choices');c.innerHTML='';if(id==='start')document.getElementById('badge').textContent='Bab 1: Awal Mula';else if(n.text.includes('SELAMAT'))document.getElementById('badge').textContent='KASUS PECAH!';else document.getElementById('badge').textContent='Menyelidiki...';n.choices.forEach(ch=>{const b=document.createElement('button');b.className='btn';b.textContent=ch.text;b.onclick=()=>go(ch.next);c.appendChild(b)});}
go('start');
</script>
</body>
</html>
