<!doctype html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Petualangan Ajaib - CYOA Game</title>
  <style>
    * {margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Segoe UI','Comic Sans',sans-serif;background:linear-gradient(135deg,#667eea,#7643b2);min-height:100vh;display:flex;justify-content:center;align-items:center;padding:20px}
    .game-container{background:white;border-radius:24px;padding:30px;max-width:600px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
    h1{text-align:center;color:#7644a2;font-size:28px;margin-bottom:5px}
    .subtitle{text-align:center;color:#888;font-size:14px;margin-bottom:20px}
    .story-box{background:#f8f6ff;border-radius:16px;padding:24px;min-height:200px;margin-bottom:20px;font-size:18px;line-height:1.7;color:#333}
    .choices{display:flex;flex-direction:column;gap:10px}
    .choice-btn{background:linear-gradient(135deg,#667eea,#7644a2);color:white;border:none;border-radius:12px;padding:14px20px;font-size:16px;cursor:pointer;transition:transform 0.2s, box-shadow 0.2s}
    .choice-btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(102,126,234,0.4)}
    .reset-btn{background:#ff6b6b;color:white;border:none;border-radius:12px;padding:10px20px;font-size:14px;cursor:pointer;margin-top:15px;display:block;width:100%}
    .badge{display:inline-block;background:#ffd700;color:#333;padding:4px 12px;border-radius:20px;font-size:13px;margin-bottom:10px}
    @media (max-width: 480px) {
      .game-container { padding: 20px; }
      .story-box { font-size: 16px; padding: 16px; }
    }
  </style>
</head>
<body>

  },

    ]
  },
  ngomongBurung: {
    text: "Burung itu ternyata bisa bicara! 'Cip! Aku penjaga petualangan! Bawa kunci ini Ke: Sebais hadiah, Kamu akan menemukan sesuatu yang istimewa!'",
    choices: [
      { text: "┬░ŌÅä Ambil kali dan ke Hutan Pelangi", next: "hutanPelangi" },
      { text: "┬░Ōłō Tanya burung soal harta karun", next: "tanyaBurung" }
    ]
  },
  sarapan: {
    text: "Kamu makan nasi goreng buatan ibu. Enak banget! Setelah kenyang, kamu lihlat peta itu mulai bersinar. 'Ayo, petualangan menunggumu'",
    choices: [
      { text: "┬░ŌŹī Baca peta dengan serius", next: "bukaPeta" },
      { text: "┬░┬Ė Tidur lagi ah", next: "tidurLagi" }
    ]
  },
  tidurLagi: {
    text: "Kamu tidur lagi dan mimmi jadi pahlawan super Tapi bangun, burung.l. Selaisi telah pergi dan petanya hilang.",
    choices: [
      { text: "┬░┬Š Coba lagi! Mulai petualangan baru", next: "start" }
    ]
  },
  hutanPelangi: {
    text: "Selamat datang di Hutan Pelangi! Pepohonan di sini berwarna-warni ŌĆö ada merah, kuning, hijau, biru, ungu! Kamu bertemu sekelompok wanta yang bisa bicara. Mereka bilang dapet jembatan pelangi di ujung hutan!",
    choices: [
      { text: "┬░ŌŹł Cari jembatan pelangi", next: "jembatanPelangi" },

    ]
  },

      { text: "┬░ŌåĪ Masuk ke istana awan", next: "istanaAwan" },
      { text: "┬░Ōīł Lompat-lompat di awan", next: "lompatAwan" }
    ]
  },
  tannyBurung: {
    text: "Burung itu burung emas itu ternyata bisa bicara! 'Cip! Di seni, kenangan petualangan adalah menu / Guru sekarang, Pernah Starli?!'",
    choices: [
      { text: "┬░ŌÅä Ambil kali dan ke Kasink Sahwabat", next: "bukaPeta" },
      { text: "┬░ŌĢ¢ Kejar Burung dengan bawa Emas!", next: "mainkel_Permen" }
    ]
  },
  gunungAwan: {
    text: "Kemampu sampai di puncak gunung. Di sini ada sebuah istana awan yang megah! Kamu bisa lompat-lompat di avan!",
    choices: [
      { text: "┬░ŌåĪ Masuk ke istana awan", next: "istanaAwan" }

    choices: [
      { text: "┬░┬Ģ Main lagi! ­Øī®­Øöż­Øöź­Øö½", next: "start" }

    choices: [
      { text: "┬░ŌåĪBaca nak nekara burung!", next: "gunungAwan" }
    ]

  wumanSegara: {
    text: "Kamu dan Luna berhasil nampai di istana persahabatan. Kamu taksan dengan penuh pengalaman. Ini adalah terkenir terindatanya dan pentingnnya sabagai anggota menarik penaik. Bagi masara taksakan dan salaming salut);",
    choices: [
      { text: "┬░ŌŹź Ters Sabar!!! Order DM", next: "start" }
    ]
  }
};

function startGame() { showNode("start"); }

function showNode(nodeId) {
  const n = story[nodeId];
  if (!n) return;
  document.getElementById("storyBox").innerHTML = n.text;
  const c = document.getElementById("choicesContainer");
  c.innerHTML = "";
  if (nodeId === "start") {
    document.getElementById("badgeDisplay").textContent = ┬░ŌĆö Petualangan Baru";
  } else if (n.text.includes("SELAMAT")) {
    document.getElementById("badgeDisplay").textContent = "┬░¦-┬Š SELESAI! |­Øī«³'S";
  } else {
    document.getElementById("badgeDisplay").textContent = "┬░ŌĆö Petualangan";
  }
  n.choices.forEach(ch => {
    const b = document.createElement("button");
    b.className = "choice-btn";
    b.textContent = ch.text;
    b.onclick = () => showNode(ch.next);
    c.appendChild(b);
  });
}

function resetGame() { showNode("start"); }

startGame();
</script>
</body>
</html>
