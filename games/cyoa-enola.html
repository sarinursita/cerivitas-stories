let lastChosenText = "";
function startGame() { lastChosenText = ""; showNode("intro"); }

function showNode(nodeId) {
  const node = story[nodeId];
  if (!node) { console.error("Node not found:", nodeId); return; }
  
  document.getElementById("storyBox").innerHTML = node.text.replace(/\n/g, '<br>');
  
  const container = document.getElementById("choicesContainer");
  container.innerHTML = "";
  
  if (nodeId === "intro") {
    document.getElementById("badgeDisplay").textContent = "🌟 Awal Cerita";
  } else if (lastChosenText) {
    document.getElementById("badgeDisplay").textContent = lastChosenText;
  } else {
    document.getElementById("badgeDisplay").textContent = "🌟 Lanjutan";
  }
  
  if (node.choices && node.choices.length > 0) {
    node.choices.forEach(choice => {
      const btn = document.createElement("button");
      btn.className = "choice-btn" + (node.isEnding ? " end-btn" : "");
      btn.textContent = choice.text;
      btn.onclick = function() {
        lastChosenText = choice.text;
        if (choice.next && story[choice.next]) {
          showNode(choice.next);
        } else if (choice.next) {
          console.error("Missing node:", choice.next);
          showNode("intro");
        } else {
          showNode("intro");
        }
      };
      container.appendChild(btn);
    });
  }
}

function resetGame() { showNode("intro"); }
startGame();
</script>
