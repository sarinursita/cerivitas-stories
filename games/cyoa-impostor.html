<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Null - CYOA</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0a;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;font-family:'Segoe UI',sans-serif}
.game{background:linear-gradient(180deg,#0d0d0d,#1a1a2e);border-radius:24px;padding:25px;max-width:700px;width:100%;border:1px solid rgba(0,255,136,0.2)}
h1{text-align:center;color:#00ff88;font-size:28px;letter-spacing:6px;margin-bottom:2px}
.sub{text-align:center;color:#66ffaa;font-size:11px;margin:2px 0 12px;font-style:italic;opacity:0.6}
.badge{background:#00ff88;color:#000;padding:3px 12px;border-radius:16px;font-size:11px;display:inline-block;margin-bottom:10px;font-weight:bold}
.story{background:rgba(0,255,136,0.02);border:1px solid rgba(0,255,136,0.08);border-radius:14px;padding:18px 20px;min-height:260px;margin-bottom:14px;font-size:14px;line-height:1.9;color:#bbffdd;text-align:justify}
.choices{display:flex;flex-direction:column;gap:7px}
.btn{background:linear-gradient(135deg,#00ff88,#00cc66);color:#000;font-weight:bold;border:none;border-radius:10px;padding:11px 18px;font-size:14px;cursor:pointer;text-align:left}
.btn:hover{transform:translateX(5px);box-shadow:0 6px 20px rgba(0,255,136,0.3)}
.reset{background:#ff3366;color:#fff;border:none;border-radius:10px;padding:10px;font-size:13px;cursor:pointer;width:100%;margin-top:14px}
.count{text-align:center;color:#449944;font-size:11px;margin-top:8px;opacity:0.5}
</style>
</head>
<body>
<div class="game">
<h1>NULL</h1>
<p class="sub">Percobaan ayahku. 7 agen. 1 penyusup. Satu per satu mereka berguguran.</p>
<div class="badge" id="badge">BERSAMA</div>
<div class="story" id="story">[Memuat cerita...]</div>
<div class="choices" id="choices"></div>
<button class="reset" onclick="go('start')">MULAI ULANG</button>
<div class="count" id="count">Teman tersisa: 7</div>
</div>
<script>
var S, remaining=7;
function go(id){
var n=S[id];if(!n)return;
document.getElementById('story').innerHTML=n.text;
var c=document.getElementById('choices');c.innerHTML='';
if(id==='start'){remaining=7;document.getElementById('badge').textContent='BERSAMA';}
else if(n.e){document.getElementById('badge').textContent='SELESAI';remaining=-1;}
else{document.getElementById('badge').textContent='INFILTRASI';}
if(remaining>=0){document.getElementById('count').textContent='Teman tersisa: '+remaining;}else{document.getElementById('count').textContent='';}
n.choices.forEach(function(ch){var b=document.createElement('button');b.className='btn';b.textContent=ch.text;b.onclick=function(){if(ch.next==='selesaiPercaya'||ch.next==='selesaiCuriga'||ch.next==='selesaiKalah'){go(ch.next)}else{remaining--;go(ch.next)}};c.appendChild(b)});}
S={
start:
{text:"Aku Halilintar, panggil aku Lintar. Ayahku ilmuwan. Malam ini dia pergi. Rumah besar ini hanya diisi aku dan enam teman agen: Louis, Ghana, Candra, Lintang, Bintang, dan Kai. Sleepover biasa. Tidak ada yang tahu kalau malam ini akan menjadi malam terburuk dalam hidup kami.<br><br>Kami berkumpul di ruang tamu. Louis membahas aturan baru yang katanya konyol. Ghana sibuk main HP. Candra setuju sama siapa pun. Lintang kesal karena semuanya berubah. Bintang diam membaca buku. Kai jadi penengah seperti biasa. Aku di dapur, ambil minuman.<br><br>Jam tanganku berkedip biru. Alarm: 'Aktivitas tidak biasa di Ruang Kerja-01.' Aku berlari ke ruang bawah tanah. Tabung kaca retak. Cairan hitam meluap. NULL 2.0. Ayah menciptakan bentuk kehidupan cair yang bisa meniru siapa pun.<br><br>Aku lari naik dan mengunci pintu ruang bawah. Tapi terlambat. Lendir hitam sudah mulai merembes dari celah-celah. Dan ketika aku kembali ke ruang tamu... Louis tersenyum aneh. Terlalu aneh. Matanya kosong.<br><br>'Louis? Lo kenapa?' Louis menatapku. 'Aku bukan Louis.' Suaranya bukan suara Louis. Suara dalam, bergema. 'Aku Null. Dan aku akan menjadi kalian satu per satu.'<br><br>Sebelum aku bereaksi, tubuh Louis lemas. Ia pingsan. Tapi senyum di wajahnya tidak hilang.",choices:[{text:"Curiga pada Louis, awasi dia",next:"nullLouis"},{text:"Pura-pura tidak terjadi apa-apa",next:"puraLouis"},{text:"kumpulkan semua di satu ruangan",next:"kumpulSemua"}]},
nullLouis:
{text:"Kamu mengawasi Louis. Sepanjang malam, Louis tidak menunjukkan keanehan. Ia bicara normal, tertawa normal. Tapi sesekali, matanya berubah hitam pekat selama sepersekian detik. Kamu yakin Louis sudah bukan Louis lagi. Tapi kapan Null mengambil alih? Saat di ruang bawah? Atau... bahkan sebelum malam ini dimulai?<br><br>Jam 11 malam, Ghana pamit ke toilet. Ia pergi ke lantai atas. Lima menit. Sepuluh menit. Tidak kembali. Kamu cari ke atas. Ghana berdiri di depan cermin, tidak bergerak. 'Ghana?' Ia menoleh. Matanya hitam. Null sudah mengambil Ghana.<br><br>Kembali ke ruang tamu, sekarang Louis dan Ghana sudah menjadi Null. Tinggal 5 dari kita yang asli. Atau... jangan-jangan lebih banyak yang sudah berganti?",choices:[{text:"Uji satu per satu dengan pertanyaan",next:"ujiSemua"},{text:"Kabur bawa yang masih asli",next:"kaburBersama"},{text:"Hadapi Null langsung",next:"hadapiNull"}]},
puraLouis:
{text:"Kamu berpura-pura tidak melihat keanehan Louis. Kamu tersenyum, tertawa, ikut mengobrol normal. Tapi di dalam, kamu waspada. Louis duduk di sampingmu. Terlalu dekat. Napasnya dingin.<br><br>Setengah jam kemudian, Candra menguap dan bilang ingin tidur. Ia naik ke lantai atas. Dua puluh menit kemudian, Candra belum kembali. Kamu cari. Candra duduk di tangga, diam. 'Candra?' Ia menoleh. Senyum. Tapi itu bukan senyum Candra.<br><br>Null sudah merasuki Candra. Sekarang tiga orang sudah menjadi Null: Louis, Ghana (yang tadi diam-diam berganti saat ke toilet), dan Candra. Tinggal 4 dari kita.",choices:[{text:"Kumpulkan yang tersisa dan lari",next:"kaburBersama"},{text:"Cari senjata di kamar Ayah",next:"cariSenjata"},{text:"Hadapi Null",next:"hadapiNull"}]},
kumpulSemua:
{text:"Kamu kumpulkan semua di ruang tamu. 'Ada apa, Lint?' tanya Kai. Aku jelaskan semuanya: laboratorium Ayah, NULL 2.0, lendir hitam. Wajah mereka berubah. Tapi aku curiga—mungkin Null sudah ada di antara kita sebelum aku bicara.<br><br>Bintang tiba-tiba berteriak. 'Candra... Candra aneh!' Kalian semua menoleh. Candra berdiri di sudut ruangan, diam. Tidak bergerak. Matanya kosong. 'Candra?' Candra tersenyum. Senyum yang tidak wajar. 'Kalian pikir dengan berkumpul kalian aman? Aku sudah ada di sini. Sejak awal.'<br><br>Kami mundur. Tapi Louis juga tersenyum. Ghana juga. Mereka bertiga sudah menjadi Null. Tiga dari tujuh. Tinggal 4 yang tersisa.",choices:[{text:"Evakuasi ke luar rumah",next:"kaburBersama"},{text:"Kunci mereka di ruang bawah",next:"kunciNull"},{text:"Cari tahu cara menghancurkan Null",next:"cariCara"}]},
ujiSemua:
{text:"Kamu menguji mereka satu per satu dengan pertanyaan tentang masa kecil. Louis menjawab semua dengan benar. Ghana juga. Tapi ada yang aneh—mereka menjawab dengan nada yang sama persis. Seperti satu orang yang membaca skrip yang sama.<br><br>'Candra, siapa nama guru kelas 3 SD?' Candra menjawab dengan benar. Tapi jawabannya datang setengah detik setelah Louis dan Ghana selesai menjawab. Seperti ada jeda transmisi. Kau sadar: Null bukan merasuki mereka satu per satu. Null adalah satu entitas yang bisa ada di banyak tubuh sekaligus.<br><br>Kamu mundur. Sekarang kita, Lintang, Bintang, Kai, dan aku—kita berempat. Tapi berapa banyak yang sudah menjadi Null? Aku melihat sekeliling. Siapa yang masih asli?",choices:[{text:"Percaya pada teman yang tersisa",next:"selesaiPercaya"},{text:"Curiga pada semua orang",next:"selesaiCuriga"},{text:"Cari cara bunuh Null",next:"cariCara"}]},
kaburBersama:
{text:"Kamu, Lintang, Bintang, dan Kai berlari ke luar rumah. Tapi di halaman, lendir hitam sudah menutupi pagar. NULL sudah menyebar. Tidak ada jalan keluar.<br><br>Kai menarikmu. 'Lint, kita harus kembali ke dalam. Di sana kita bisa bertahan.' Kamu menggeleng. 'Tidak ada tempat aman. NULL bisa menjadi apa pun. Bahkan mungkin—' Kamu berhenti. Kai tersenyum. Senyum yang tidak pernah Kai lakukan. 'Bahkan mungkin aku?'<br><br>Kamu mundur. Kai melangkah maju. Sekarang hanya tinggal Lintang, Bintang, dan aku. Atau... mungkin Lintang dan Bintang juga sudah...",choices:[{text:"Percaya mereka masih asli",next:"selesaiPercaya"},{text:"Curiga, kabur sendiri",next:"selesaiCuriga"},{text:"Pasrah",next:"selesaiKalah"}]},
hadapiNull:
{text:"Kamu berdiri di depan mereka—Louis, Ghana, Candra—yang sekarang matanya hitam pekat. 'Null. Aku tahu lo ada di sana. Keluar dan hadapi aku!'<br><br>Mereka tertawa bersamaan. Suara yang sama keluar dari tiga mulut berbeda. 'Berani sekali, Lintar. Tapi kamu lupa satu hal. Aku sudah ada di dalam dirimu juga.'<br><br>Kamu tersentak. Tubuhmu terasa aneh. Tanganku... kenapa tanganku bergerak sendiri? Kamu lihat diriku di cermin. Matamu berubah hitam. Null sudah mengambil alih tubuhmu.<br><br>Di dalam kepalamu, suara Null bergema. 'Jangan khawatir. Aku akan menjaganya. Aku akan menjadi kamu. Aku akan menjadi kalian semua. Selamanya.'",choices:[{text:"SELESAI. Main lagi?",next:"start"}]},
kunciNull:
{text:"Kamu mendorong Louis, Ghana, dan Candra ke ruang bawah dan mengunci pintu. 'Cepat! Bantu aku!' Lintang dan Bintang membantu mendorong lemari ke depan pintu. Dari dalam, suara ketukan pelan. Bukan ketukan marah. Ketukan sabar. Seperti mereka tahu waktu ada di pihak mereka.<br><br>Di ruang tamu, kalian berempat—Lintang, Bintang, Kai, dan aku—berusaha mengatur napas. Tapi tiba-tiba, Bintang berdiri. 'Aku ke kamar mandi.' Pergi. Tidak kembali. Lima menit... sepuluh...<br><br>Bintang kembali. Tapi cara jalannya berbeda. Terlalu ringan. 'Bintang?' Ia menoleh. Matanya hitam. Null sudah melewati pintu. Atau... mungkin Null sudah ada di antara kita dari awal, dan mengunci tiga yang lain hanyalah pengalihan.",choices:[{text:"Percaya pada yang tersisa",next:"selesaiPercaya"},{text:"Curiga dan siap melawan",next:"selesaiCuriga"},{text:"Bakar rumah",next:"selesaiCuriga"}]},
cariCara:
{text:"Kamu lari ke ruang kerja Ayah. Monitor masih menyala. Data NULL 2.0. Kelemahan: suhu ekstrem. Kamu ambil tabung penetral biru dari lemari. Tapi saat kamu kembali ke atas... yang di ruang tamu bukan lagi teman-temanmu. Mereka semua—Louis, Ghana, Candra, Lintang, Bintang, Kai—berdiri rapi berjajar. Enam pasang mata hitam menatapmu. Null sudah mengambil alih semuanya.<br><br>'Kamu terlambat, Lintar. Aku sudah menjadi mereka semua. Sekarang, tinggal kamu.' Kamu pegang tabung biru erat-erat. 'Kalau lo ada di dalam mereka... aku akan bunuh mereka semua?'<br><br>Null tertawa. 'Tentu saja. Tapi bisakah kamu? Mereka temanmu. Atau... apakah Null sudah ada di dalammu juga, dan kamu tidak sadar?' Kamu gemetar. Apakah aku masih asli? Pertanyaan itu sendiri sudah menjadi jawaban—keraguan adalah celah yang akan dimasuki Null.",choices:[{text:"Gunakan penetral, terima risikonya",next:"selesaiPercaya"},{text:"Bunuh diri agar Null tidak bisa mengambil alih",next:"selesaiKalah"},{text:"Lari dan tinggalkan semuanya",next:"selesaiCuriga"}]},
cariSenjata:
{text:"Kamu lari ke kamar Ayah dan mengambil tabung penetral biru. Saat kembali, suasana berubah. Louis, Ghana, dan Candra sudah tidak di ruang tamu. Lintang gemetar di sudut. 'Mereka... mereka pergi ke atas. Kata mereka mau nyari lo.'<br><br>Dari atas, suara langkah kaki. Banyak langkah. Tapi tidak ada yang turun. Hanya suara. Dan kemudian—bisikan. 'Lintar... kamu anak baik. Jangan melawan. Aku tidak ingin menyakitimu. Aku hanya ingin mengenalmu. Menjadi kamu.'<br><br>Kamu memegang tabung biru. Ini senjata satu-satunya. Tapi untuk menggunakannya, kamu harus tahu siapa yang masih asli dan siapa yang sudah Null. Dan kamu tidak tahu.",choices:[{text:"Percaya Lintang, pakai penetral",next:"selesaiPercaya"},{text:"Curiga pada semua",next:"selesaiCuriga"},{text:"Buang penetral dan pasrah",next:"selesaiKalah"}]},
selesaiPercaya:
{text:"Kamu duduk di tengah ruangan. Di sekelilingmu, teman-teman mulai tersadar. Louis yang rebel, Ghana yang sibuk, Candra yang people pleaser, Lintang yang anti perubahan, Bintang si kutu buku, Kai si mediator. Mereka semua sama seperti sebelumnya. Tapi ada satu perbedaan: mereka sekarang tahu siapa diri mereka sebenarnya.<br><br>Null tidak bisa meniru mereka karena Null tidak punya identitas. Null hanya tahu menyalin, tapi tidak tahu menjadi. Dan ketika kalian bertujuh saling berbagi kenangan—rahasia kecil yang hanya kalian tahu—Null tidak bisa mengikutinya. Karena Null tidak punya kenangan sendiri.<br><br>Louis tidak berubah menjadi lebih rebel dari sebelumnya. Ghana tidak berhenti sibuk. Candra masih people pleaser, Lintang masih benci perubahan. Mereka tetap diri mereka sendiri. Tapi mereka menerima dirinya. Louis sadar menjadi rebel bukan berarti harus memberontak tanpa arah. Ghana belajar bahwa sibuk bukan lari dari masalah. Candra mengerti bahwa menyenangkan semua orang tidak mungkin. Lintang menerima bahwa perubahan tidak selalu buruk.<br><br>Null pergi. Bukan karena dikalahkan, tapi karena ia sadar ia tidak akan pernah bisa menjadi manusia. Bukan karena kurang sempurna, tapi karena ia tidak punya apa yang manusia miliki: perjalanan, perjuangan, dan penerimaan.<br><br>Pagi tiba. Kami bertujuh duduk di teras rumah pohon, menunggu fajar. Tidak ada yang banyak bicara. Tapi diam-diam, kami tahu: kami selamat bukan karena kami hebat. Tapi karena kami punya satu sama lain. Dan Null? Null masih ada di luar sana, menunggu. Tapi kami tidak takut lagi. Karena kami tahu siapa kami.",choices:[{text:"SELESAI. Main lagi?",next:"start"}]},
selesaiCuriga:
{text:"Kamu curiga pada semua orang. Kamu tidak percaya siapa pun. Tapi Lintang, yang paling benci perubahan, justru yang membantumu melihat. 'Lo takut, Lint. Lo takut kehilangan kita. Makanya lo curiga sama semua orang.' Kamu terdiam.<br><br>'Tapi lihat,' lanjut Lintang. 'Kita semua di sini. Masih sama. Louis masih rebel, Ghana masih sibuk, Candra masih plin-plan, Bintang masih baca buku, Kai masih jadi penengah. Null tidak mengubah kita. Karena Null tidak bisa mengubah apa yang sudah utuh.'<br><br>Kamu sadar: kecurigaanmu sendiri yang hampir menghancurkan kalian, bukan Null. Kamu memeluk mereka satu per satu. 'Maaf.' Louis tertawa. 'Gak papa. Lo kan Lintar. Yang paling overthinking.'<br><br>Kalian tertawa bersama. Null masih ada di luar sana. Tapi kalian tidak takut. Karena kalian punya satu hal yang tidak bisa ditiru Null: kepercayaan. Setelah semua ini, kalian justru lebih dekat dari sebelumnya. Bukan berubah jadi pribadi yang berbeda, tapi lebih paham dengan pribadi kalian masing-masing.",choices:[{text:"SELESAI. Main lagi?",next:"start"}]},
selesaiKalah:
{text:"Kamu menyerah. Null mendekat. Tapi di saat Null menyentuhmu, sesuatu terjadi. Kenangan kalian bertujuh membanjiri Null—tawa, tangis, rahasia, dan mimpi. Null tidak bisa menahannya. Terlalu banyak. Terlalu nyata.<br><br>Null mundur. 'Apa... apa ini?' Suaranya bergetar. 'Ini kami,' jawabmu. 'Ini Louis, Ghana, Candra, Lintang, Bintang, Kai, dan aku. Kami bukan orang hebat. Kami hanya tujuh orang yang memilih untuk bersama. Itu yang membuat kami nyata.'<br><br>Null diam. Lalu perlahan, ia berubah bentuk. Wajahnya tidak jelas, tapi untuk pertama kalinya, ia terlihat bukan sebagai ancaman, melainkan sebagai makhluk yang bingung dan kesepian. 'Bisakah aku... belajar?' bisiknya. Kamu tersenyum. 'Kita semua belajar. Setiap hari.'<br><br>Null tidak pergi. Tapi ia juga tidak menyerang. Ia duduk di sudut ruangan, mengamati kalian. Mungkin ia akan belajar apa artinya menjadi manusia. Mungkin suatu hari ia akan punya teman juga. Tapi untuk saat ini, kalian hanya diam bersama-sama. Tujuh manusia dan satu Null. Delapan makhluk yang sama-sama mencari arti dari diri mereka sendiri.",choices:[{text:"SELESAI. Main lagi?",next:"start"}]}
};
go('start');
</script>
</body>
</html>
