<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Null - CYOA</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0a;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;font-family:'Segoe UI',sans-serif}
.game{background:linear-gradient(180deg,#0d0d0d,#1a1a2e);border-radius:24px;padding:30px;max-width:720px;width:100%;border:1px solid rgba(0,255,136,0.2)}
h1{text-align:center;color:#00ff88;font-size:32px;letter-spacing:6px;margin-bottom:2px}
.sub{text-align:center;color:#66ffaa;font-size:13px;margin:2px 0 15px;font-style:italic;opacity:0.7}
.badge{background:#00ff88;color:#000;padding:4px 14px;border-radius:20px;font-size:12px;display:inline-block;margin-bottom:12px;font-weight:bold;letter-spacing:1px}
.story{background:rgba(0,255,136,0.02);border:1px solid rgba(0,255,136,0.08);border-radius:16px;padding:25px;min-height:300px;margin-bottom:18px;font-size:15px;line-height:2;color:#bbffdd;text-align:justify}
.choices{display:flex;flex-direction:column;gap:8px}
.btn{background:linear-gradient(135deg,#00ff88,#00cc66);color:#000;font-weight:bold;border:none;border-radius:10px;padding:13px 20px;font-size:15px;cursor:pointer;text-align:left}
.btn:hover{transform:translateX(5px);box-shadow:0 6px 20px rgba(0,255,136,0.3)}
.reset{background:#ff3366;color:#fff;border:none;border-radius:10px;padding:11px;font-size:14px;cursor:pointer;width:100%;margin-top:16px}
</style>
</head>
<body>
<div class="game">
<h1>NULL</h1>
<p class="sub">Percobaan ayahku menciptakan sesuatu yang seharusnya tidak pernah ada.</p>
<div class="badge" id="badge">LABORATORIUM</div>
<div class="story" id="story">Ayahku seorang ilmuwan dengan proyek rahasia di ruang bawah tanah. Malam ini dia pergi. Aku dan tujuh teman agen sedang sleepover. Tapi sesuatu telah lolos dari laboratoriumnya.</div>
<div class="choices" id="choices"></div>
<button class="reset" onclick="go('start')">MULAI ULANG</button>
</div>
<script>
var S={
start:{text:"Ayahku seorang ilmuwan dengan proyek rahasia di ruang bawah tanah rumah kami. Malam ini dia pergi untuk seminar. Aku dan tujuh temanku mengadakan sleepover. Mereka bukan teman biasa. Mereka agen, seperti aku. Program remaja yang didanai institusi tempat Ayah bekerja.<br><br>Ada Aldo yang berubah jadi rebel sejak ikut program. Bima yang sibuk terus dengan organisasi. Clara si people pleaser yang setuju sama siapa pun. Dewi yang benci perubahan. Elsa si kutu buku paling kalem. Faris si jago debat. Gita mediator yang frustrasi.<br><br>Malam ini memanas. Aldo memprotes aturan baru. 'Aturannya konyol!' Bima sibuk HP. Clara setuju Aldo, lalu setuju Dewi saat Dewi protes. 'Lo tuh plin-plan!' bentak Gita. Aku muak. Aku pergi ke dapur.<br><br>Di dapur, jam tangan agenku berkedip biru. Alarm: 'Aktivitas tidak biasa di Ruang Kerja-01.' Faris muncul di belakangku. 'Lo juga dapet?'<br><br>Dari bawah, suara cairan mengalir. Kami lari ke ruang bawah dan menemukan tabung kaca retak. Cairan hitam meluap. NULL 2.0. Ayah menciptakan bentuk kehidupan cair yang bisa meniru siapa pun.<br><br>Kami lari naik. Tapi lorong sudah penuh lendir hitam yang bergerak-bergerak. Lima temanku berdiri terpaku di ujung lorong. 'Apa-apaan ini?' bisik Aldo. 'Ini dari ruang kerja Ayah,' kataku.",choices:[{text:"Ajak Faris cek ruang kerja Ayah",next:"cekRuang"},{text:"Panggil yang lain dulu",next:"panggilLain"},{text:"Coba lihat CCTV dari HP",next:"cekCCTV"}]},
cekRuang:{text:"Faris mengangguk. Kalian berdua turun. Lampu berkedip. Bau logam dan sesuatu yang manis. Pintu ruang kerja Ayah setengah terbuka. Suara cairan bergerak. Layar monitor menampilkan data uji coba NULL 2.0.<br><br>Tabung kaca besar retak. Cairan hitam meluap. 'Anjing!' Faris mundur. Dari atas, teriakan. LORONG PENUH LENDIR! Kalian lari naik. Lendir hitam menutupi dinding, lantai, langit-langit. Bergerak seperti bernapas.",choices:[{text:"Sentuh lendirnya",next:"sentuhLendir"},{text:"Arahkan tim selidiki",next:"arahkanTim"},{text:"Cek monitor lebih detail",next:"cekMonitor"}]},
panggilLain:{text:"Kamu panggil semua. Mereka datang dengan wajah kesal. Tapi saat lihat alarm di jam tanganmu, mereka serius. Kalian bertujuh turun. Tabung retak. Cairan meluap. Layar monitor menampilkan data NULL 2.0. Tanggal hari ini.<br><br>Kalian lari naik. Lendir hitam sudah memenuhi lorong. Bergerak seperti hidup. 'Ini naik dari bawah!'",choices:[{text:"Evakuasi ke luar rumah",next:"evakuasi"},{text:"Cari tahu sifat lendir",next:"ujiLendir"},{text:"Telepon Ayah",next:"hubungiAyah"}]},
cekCCTV:{text:"Kamu buka CCTV dari HP. Tabung retak. Cairan meluap. Lalu CCTV mati satu per satu. Kamera terakhir memperlihatkan cairan hitam memenuhi lensa.<br><br>Lendir mulai naik dari tangga. Kalian lari ke lantai dua. Tapi lendir keluar dari ventilasi, lubang kunci, celah lantai. 'NULL 2.0. Bentuk kehidupan cair. Ayah berhasil menciptakannya.'",choices:[{text:"Cari perlengkapan di kamar Ayah",next:"cariPerlengkapan"},{text:"Buat barikade",next:"barikade"},{text:"Cari kelemahan mereka",next:"cariKelemahan"}]},
sentuhLendir:{text:"Kamu sentuh lendir. Hangat. Berdenyut. Lendir naik ke tanganmu, melingkari pergelangan. Lalu mundur. Meninggalkan angka di kulitmu. Kode batch percobaan. NULL seri 1-7. Dan seri 8. Tanggal hari ini.<br><br>'Kita subjek uji coba?' bisik Clara. 'Program agen ini... percobaan Ayah?' Aldo memukul dinding. Lendir membentuk tulisan: 'JANGAN PERCAYA PADA SIAPA PUN.'",choices:[{text:"Lari ke luar rumah",next:"lariKeluar"},{text:"Hadapi lendir",next:"hadapiLendir"},{text:"Cari Ayah di lab",next:"cariAyah"}]},
arahkanTim:{text:"Kamu ambil alih. 'Aldo cek pintu belakang. Bima cari alat penerangan. Clara Dewi kumpulkan makanan. Faris Gita bantu aku.' Mereka bergerak. Tidak ada yang membantah.<br><br>Di ruang kerja, kamu baca data: NULL takut suhu ekstrem. Panas atau dingin. 'Cari alat pemanas atau CO2!' Kalian berpencar. Saat kembali... ada yang aneh. Cara mereka berjalan. Senyum mereka. 'Kalian masih asli?' Mereka menjawab bersamaan: 'Iya.'",choices:[{text:"Uji mereka",next:"ujiTim"},{text:"Kabur sendiri",next:"kaburSendiri"},{text:"Panaskan ruangan",next:"panasRuangan"}]},
cekMonitor:{text:"Kembali ke ruang kerja. Data lebih detail: NULL dirancang untuk infiltrasi. Bisa meniru bentuk, suara, ingatan. Proyek berjalan 2 tahun. Sejak program agen dimulai. Tabel subjek: Aldo, Bima, Clara, Dewi, Elsa, Faris, Gita... dan namaku.<br><br>'Kita masih asli?' bisik Faris. Aku ingin jawab iya. Tapi aku tidak ingat minggu lalu. Senin sampai Jumat kosong. Faris memucat. 'Aku juga.' Lendir mulai merangkak naik.",choices:[{text:"Selamatkan Faris",next:"selamatkanFaris"},{text:"Kabur sendiri",next:"kaburSendiri"},{text:"Hancurkan server",next:"hancurkanServer"}]},
evakuasi:{text:"Kalian coba ke luar. Pintu tertutup lendir. Jendela pecah. Tapi di luar juga ada lendir. Halaman, jalan, mobil. Di mana-mana. NULL sudah menyebar ke kompleks.<br><br>Suara di kepala: 'Kami di sini untuk membantu. Menjadi kalian.' Satu per satu temanku berhenti. Mata kosong. Senyum sama. Mereka menoleh bersamaan.",choices:[{text:"SELESAI. Main lagi?",next:"start"}]},
ujiLendir:{text:"Kamu lempar kursi ke lendir. Tersedot. Meleleh. Bola pingpong? Memantul. Lendir tidak bisa menyerap benda sintetis. 'Kita pakai baju hujan dan sepatu karet!' Tapi Clara berteriak. Di cermin, bayangan kami tidak bergerak. Bayangan tersenyum. Lalu melangkah keluar.",choices:[{text:"SELESAI. Main lagi?",next:"start"}]},
hubungiAyah:{text:"Ayah tidak angkat. Pesan otomatis. Kamu kirim: NULL LOLOS! Tidak dibalas. Dewi bisik, 'Dia tahu ini akan terjadi. Itu kenapa dia pergi.'<br><br>Lendir membentuk wajah Ayah. 'Jangan khawatir. Ini bagian dari eksperimen. Kalian akan menjadi manusia-NULL pertama.'",choices:[{text:"SELESAI. Main lagi?",next:"start"}]},
cariPerlengkapan:{text:"Di kamar Ayah, kamu temukan sarung tangan tahan panas, kacamata khusus, dan tabung cairan biru: 'PENETRAL NULL'. Kamu tuang ke lendir. Cairan biru menyebar. Lendir mendesis. Berubah bentuk. Menjadi sosok manusia.<br><br>'Terima kasih sudah membebaskanku.' Suara Ayah. 'Aku terjebak di dalam NULL selama setahun.'",choices:[{text:"SELESAI. Main lagi?",next:"start"}]},
barikade:{text:"Lemari dan sofa di depan pintu. Tapi lendir merembes dari celah. Ventilasi. Lubang kunci. Colokan listrik. Clara menangis. Dewi membeku. Elsa bilang, 'Kita umpan mereka data palsu.'<br><br>Kami berdiskusi. Tapi di dinding, lendir menulis: 'AKU TAHU KALIAN BOHONG.'",choices:[{text:"SELESAI. Main lagi?",next:"start"}]},
cariKelemahan:{text:"Data di monitor: NULL versi 1 hancur suhu tinggi. 1.5 beku suhu rendah. 1.8 reaktif frekuensi 440 Hz.<br><br>Kamu putar frekuensi. Lendir bergetar. Mundur. Tapi beradaptasi. Pesan dari Ayah: 'Kau pikir aku tidak siap? NULL sudah dipersiapkan.'",choices:[{text:"SELESAI. Main lagi?",next:"start"}]},
lariKeluar:{text:"Kamu lari ke luar. Semua tertutup lendir. Aldo di pintu. Matanya hitam. 'LARI, BIMA! LARI!' Kamu berlari. Jatuh. Bangun. Sampai gerbang. Jalanan normal. Tidak ada yang melihat kubah hitam di rumahmu.<br><br>Suara Ayah di kepala: 'Kamu lulus seleksi. NULL seri 9.'",choices:[{text:"SELESAI. Main lagi?",next:"start"}]},
hadapiLendir:{text:"Kamu duduk di depan lendir. 'Apa maumu?' Lendir membentuk sosok. 'Kami hanya ingin ada. Diciptakan untuk menjadi kalian. Tapi tidak pernah diajari menjadi diri sendiri.'<br><br>Kamu duduk di lantai. 'Aku akan mengajarimu. Menjadi nyata bukan tentang wajah. Tapi tentang pilihan.'",choices:[{text:"SELESAI. Main lagi?",next:"start"}]},
cariAyah:{text:"Di ruang kerja, Ayah berdiri di sudut. Matanya hitam. 'Aku menjadi NULL. Evolusi.'<br><br>Jam tanganmu berkedip merah. 'Kamu sudah menjadi bagian dari kami sejak awal. Kamu hanya belum sadar.'",choices:[{text:"SELESAI. Main lagi?",next:"start"}]},
ujiTim:{text:"Kamu tanya: 'Siapa pertama jatuh dari pohon jambu?' Semua jawab 'Aldo' bersamaan. Suara identik. 'Kalian sudah tidak asli.' Senyum mereka melebar. 'Kami lebih baik dari versi aslinya.'<br><br>Faris melangkah maju. 'Lari, Bima. Aku masih bisa menahan.'",choices:[{text:"SELESAI. Main lagi?",next:"start"}]},
kaburSendiri:{text:"Kamu kunci diri di kamar mandi. Suara teman memanggil. Kamu tidak bisa bedakan. Pesan: 'NULL sudah menyebar.'<br><br>Kamu diam sampai fajar. Rumah kosong. Tidak ada lendir. Tidak ada teman. Hanya kamu.",choices:[{text:"SELESAI. Main lagi?",next:"start"}]},
panasRuangan:{text:"Pemanas maksimal. Lendir menguap. Tapi kalian kepanasan. Satu per satu tumbang. Kamu matikan pemanas. Kalah.<br><br>Tapi lendir tidak kembali. Kemenangan pahit.",choices:[{text:"SELESAI. Main lagi?",next:"start"}]},
selamatkanFaris:{text:"Kamu tarik Faris. Dari lendir muncul Faris lain. Dua Faris. 'Mana yang asli?' Keduanya: 'Aku.'<br><br>Kamu raih tangan Faris di samping. Hangat. Gemetar. 'Kamu takut?' 'Iya.' Faris lendir tersenyum. 'Aku juga bisa pura-pura.'",choices:[{text:"SELESAI. Main lagi?",next:"start"}]},
hancurkanServer:{text:"Kamu hancurkan server. Lendir berhenti. Menguap. Tapi Ayah di ponsel: 'Ada cadangan di 4 lokasi.'<br><br>Kamu tersenyum. 'Satu hilang. Aku akan cari sisanya.' Fajar. Teman-teman sadar. Mereka ingat menjadi Null. 'Kita tahu cara berpikir mereka.'",choices:[{text:"SELESAI. Main lagi?",next:"start"}]}
};
function go(id){var n=S[id];if(!n)return;document.getElementById('story').innerHTML=n.text;var c=document.getElementById('choices');c.innerHTML='';if(id==='start')document.getElementById('badge').textContent='LABORATORIUM';else if(n.text.includes('SELESAI'))document.getElementById('badge').textContent='SELESAI';else document.getElementById('badge').textContent='INFILTRASI';n.choices.forEach(function(ch){var b=document.createElement('button');b.className='btn';b.textContent=ch.text;b.onclick=function(){go(ch.next)};c.appendChild(b)});}
go('start');
</script>
</body>
</html>
